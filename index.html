<!DOCTYPE html>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010401;
            overflow: hidden;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: manipulation;
        }

        /* 預載介面 */
        #preloader {
            position: fixed; inset: 0;
            background-color: #010401;
            z-index: 10000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1s ease-in-out;
        }
        .loader-bar-bg {
            width: 240px; height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 24px; position: relative;
            overflow: hidden; border-radius: 2px;
        }
        .loader-bar-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            background: #10b981; width: 0%;
            transition: width 0.3s ease;
        }

        .aurora-fluid { 
            position: absolute; 
            width: 140vw; height: 140vh; 
            filter: blur(80px); opacity: 0.4; 
            mix-blend-mode: screen; will-change: transform;
            z-index: 1;
        }
        .aurora-v1 { background: radial-gradient(circle at 20% 20%, #064e3b 0%, transparent 65%); animation: aurora-flow 30s infinite alternate ease-in-out; top: -10%; left: -10%; }
        .aurora-v2 { background: radial-gradient(circle at 80% 80%, #065f46 0%, transparent 65%); animation: aurora-flow 35s infinite alternate-reverse ease-in-out; bottom: -10%; right: -10%; }
        .aurora-v3 { background: radial-gradient(circle at 50% 50%, #0d9488 0%, transparent 55%); animation: aurora-flow 25s infinite alternate ease-in-out; top: 15%; left: 15%; }
        
        @keyframes aurora-flow {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(-5%,10%) rotate(-5deg); }
        }

        @keyframes fadeInMove {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-phase-1 { animation: fadeInMove 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .anim-phase-2 { opacity: 0; animation: fadeInMove 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; }

        .preserve-3d { transform-style: preserve-3d; }

        @keyframes bonus-pop {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .bonus-item { animation: bonus-pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes zoomInEffect {
          0% { transform: scale(0.1) translateZ(-500px); opacity: 0; }
          100% { transform: scale(1) translateZ(0); opacity: 1; }
        }
        @keyframes zoomOutEffect {
          0% { transform: scale(1) translateZ(0); opacity: 1; }
          100% { transform: scale(0.1) translateZ(-500px); opacity: 0; }
        }
        .zoom-in-container { animation: zoomInEffect 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .zoom-out-container { animation: zoomOutEffect 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .watermark-text {
            position: absolute; font-size: 15vw; font-weight: 900;
            color: rgba(255, 255, 255, 0.02); white-space: nowrap;
            user-select: none; pointer-events: none; z-index: 0;
            transform: rotate(-15deg);
        }

        .music-bar {
            width: 3px; background: #10b981; margin: 0 1px;
            animation: music-bounce 1s ease-in-out infinite;
        }
        @keyframes music-bounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
    </style>
</head>

        function buildDomeStructure(pool) {
            const items = [];
            const rows = 5; 
            const itemsPerRow = Math.ceil(pool.length / rows);
            const horizontalStep = 360 / itemsPerRow;
            const verticalStep = 14; 
            pool.forEach((data, i) => {
                const rowIndex = (i % rows) - (rows - 1) / 2;
                const colIndex = Math.floor(i / rows);
                items.push({ yaw: colIndex * horizontalStep, pitch: rowIndex * verticalStep, ...data });
            });
            return items;
        }

        // --- 2. Components ---

        const GallerySlide = ({ items, isZoomed, setIsZoomed, setFocusedImage, focusedImage }) => {
            const stageRef = useRef(null);
            const rotationRef = useRef({ currentY: 0, targetY: 0 });
            const [radius, setRadius] = useState(1100);

            useEffect(() => {
                const handleResize = () => setRadius(window.innerWidth < 768 ? 650 : 1100);
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                let timer;
                const cycle = () => {
                    timer = setTimeout(() => {
                        const randomImg = items[Math.floor(Math.random() * items.length)];
                        setFocusedImage(randomImg);
                        setIsZoomed(true);
                        timer = setTimeout(() => {
                            setIsZoomed(false);
                            cycle();
                        }, 6000);
                    }, 5000);
                };
                cycle();
                return () => clearTimeout(timer);
            }, [items]);

            useEffect(() => {
                const animate = () => {
                    if (!isZoomed) {
                        rotationRef.current.targetY += 0.15;
                        rotationRef.current.currentY += (rotationRef.current.targetY - rotationRef.current.currentY) * 0.08;
                        if (stageRef.current) stageRef.current.style.transform = `translate3d(0, 0, ${-radius}px) rotateY(${rotationRef.current.currentY}deg)`;
                    }
                    requestAnimationFrame(animate);
                };
                const raf = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(raf);
            }, [isZoomed, radius]);

            return (
                <div className="absolute inset-0 flex items-center justify-center [perspective:1200px] z-10 transition-all duration-1000"
                    style={{ transform: isZoomed ? 'scale(0.85) translateZ(-150px)' : 'scale(1)', opacity: isZoomed ? 0.2 : 1 }}>

            );

            <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up">
                <div className="overflow-visible transform -translate-y-8 pr-12 md:pr-24">
                    <h2 className="text-5xl md:text-[11rem] font-bold text-white tracking-widest mb-10 md:mb-14 italic drop-shadow-2xl whitespace-nowrap">感謝各位蒞臨</h2>
                    <div className="space-y-6 mb-16 md:mb-24">
                        <p className="text-3xl md:text-[6.5rem] font-bold text-orange-100/90 whitespace-nowrap tracking-[0.1em]">2026 冠恆集團春茗</p>
                        <p className="text-3xl md:text-[6.5rem] font-bold text-orange-100/90 whitespace-nowrap tracking-[0.1em]">圓滿結束</p>
                    </div>
                    <h3 className="text-8xl md:text-[13rem] font-black text-yellow-400 italic animate-pulse drop-shadow-[0_0_60px_rgba(250,204,21,0.7)] py-8 whitespace-nowrap">下年再見!</h3>
                </div>
            </div>
        );

        // --- 3. Main Application ---

        function App() {
            const [slide, setSlide] = useState(0);
            const [isReady, setIsReady] = useState(false);
            const [isZoomed, setIsZoomed] = useState(false);
            const [focusedImage, setFocusedImage] = useState(null);

            const domeItems = useMemo(() => buildDomeStructure(PHOTO_ITEMS), []);

            const allSlides = [
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} focusedImage={focusedImage} />,
                <SloganSlide />,
                <MergedSpeechSlide />,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 animate-slide-up text-center"><h2 className="text-6xl md:text-[9rem] font-bold text-orange-200/95 tracking-[0.15em] drop-shadow-2xl mb-4 leading-tight">長期服務獎</h2><span className="text-orange-400/60 text-2xl md:text-5xl font-light tracking-[0.4em] uppercase italic">Long Service Award</span></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up"><span className="text-orange-200/90 text-6xl md:text-[10rem] font-black tracking-widest drop-shadow-lg mb-12">10 Years</span><span className="text-5xl md:text-9xl font-medium text-orange-300 drop-shadow-2xl">David Tsang</span></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up"><span className="text-orange-200/90 text-6xl md:text-[10rem] font-black tracking-widest drop-shadow-lg mb-12">15 Years</span><span className="text-5xl md:text-9xl font-medium text-orange-300 drop-shadow-2xl">Kanji Kwok</span></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up"><span className="text-orange-200/90 text-6xl md:text-[10rem] font-black tracking-widest drop-shadow-lg mb-12">20 Years</span><div className="flex flex-col gap-6 md:gap-10"><span className="text-5xl md:text-9xl font-medium text-orange-300 drop-shadow-2xl">Kason Lau</span><span className="text-5xl md:text-9xl font-medium text-orange-300 drop-shadow-2xl">Steven Ngai</span></div></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up"><span className="text-orange-200/90 text-6xl md:text-[10rem] font-black tracking-widest drop-shadow-lg mb-12">25 Years</span><span className="text-5xl md:text-9xl font-medium text-orange-300 drop-shadow-2xl">Wilson Chang</span></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 animate-slide-up text-center"><h2 className="text-[15vw] md:text-[15rem] font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-yellow-200 via-emerald-400 to-emerald-600 drop-shadow-[0_20px_60px_rgba(16,185,129,0.5)] pr-8 md:pr-16 py-8 overflow-visible leading-none">GAME TIME!</h2></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 animate-slide-up text-center transform -translate-y-8"><div className="w-full flex justify-start mb-6 max-w-6xl"><span className="text-orange-300 text-2xl md:text-4xl font-bold ml-4 md:ml-16">唔係講笑...</span></div><h2 className="text-5xl md:text-[10rem] font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 to-orange-400 leading-tight">今晚獎金、獎品<br />非常豐富！！</h2></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 animate-slide-up text-center"><span className="text-orange-300 text-3xl md:text-6xl font-bold tracking-[0.5em] mb-4">玩法</span><span className="text-white/40 uppercase tracking-[0.3em] text-sm md:text-2xl mb-12">How to Play</span><p className="text-2xl md:text-6xl font-bold text-orange-100 mb-6">被抽中的枱號，每人皆可獲得</p><span className="text-orange-400/50 uppercase text-lg md:text-3xl mb-16 tracking-wide">Every guest wins when their table number is drawn!</span><div className="flex flex-col items-center"><span className="text-7xl md:text-[14rem] font-black text-transparent bg-clip-text bg-gradient-to-b from-pink-300 to-blue-500 leading-none">豐富獎品</span><span className="text-blue-300/40 uppercase text-xl md:text-5xl mt-6">Fabulous Prizes</span><div className="mt-8 md:mt-12 px-12 py-4 bg-white/5 border border-white/10 rounded-2xl shadow-xl"><span className="text-2xl md:text-6xl font-bold text-emerald-400 tracking-widest">個人護理及小家電</span></div></div></div>,
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} focusedImage={focusedImage} />,
                <CompetitionSlide />,
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} focusedImage={focusedImage} />,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 animate-slide-up"><div className="w-full max-w-6xl transform -translate-y-8"><div className="flex justify-between items-end mb-12 border-b border-white/10 pb-4"><span className="text-orange-200/90 text-3xl md:text-6xl font-bold">Game 3</span><span className="text-orange-300 text-6xl md:text-[11rem] font-black italic drop-shadow-2xl">BINGO!</span></div><div className="space-y-8 md:space-y-12 pl-6 border-l-4 border-emerald-500/50"><div className="flex items-center gap-6"><div className="w-12 h-12 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black">1</div><p className="text-2xl md:text-5xl font-bold text-orange-100">每人手上已有一張「六合彩飛」</p></div><div className="flex items-center gap-6"><div className="w-12 h-12 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black">2</div><p className="text-2xl md:text-5xl font-bold text-orange-100">嘉賓會從 1 - 49 號中抽數字</p></div><div className="flex items-center gap-6"><div className="w-12 h-12 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black">3</div><p className="text-2xl md:text-5xl font-bold text-orange-100">最快凑成 <span className="text-emerald-400 text-5xl md:text-7xl px-2">4</span> 組號碼</p></div><div className="p-6 bg-red-600/10 border-2 border-red-500/30 rounded-2xl mt-10 shadow-2xl"><p className="text-xl md:text-4xl font-black text-red-500 tracking-wider">名額只有五個，記得盡快舉手行出嚟喇！</p></div></div></div></div>,
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} focusedImage={focusedImage} />,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up"><h2 className="text-8xl md:text-[15rem] font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-orange-600 leading-none py-8">抽獎環節</h2><span className="text-orange-200/40 text-4xl md:text-7xl font-light uppercase mt-6 italic">Lucky Draw Session</span><div className="mt-16 px-16 py-8 bg-white/10 rounded-full border border-white/20 shadow-2xl"><span className="text-3xl md:text-6xl font-bold text-emerald-400">共有 12 個獲獎名額</span></div></div>,
                <PrizeListSlide start={0} end={6} />,
                <PrizeListSlide start={6} end={12} />,
                ...[...PRIZES].reverse().map(p => <div key={`draw-${p.id}`} className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 animate-slide-up"><div className="watermark-text" style={{fontSize:'35vw', top:'0%'}}>{p.id}</div><div className="flex items-center gap-10 mb-16 relative"><span className="text-6xl md:text-[14rem] font-black text-emerald-500 drop-shadow-2xl">No. {p.id}</span><div className="h-24 md:h-56 w-[2px] bg-white/20"/><span className="text-3xl md:text-7xl font-bold text-orange-300 opacity-60 italic">Lucky Draw</span></div><div className="px-8 py-8 md:px-14 md:py-12 bg-white/5 backdrop-blur-3xl rounded-[30px] border-2 border-orange-400/30 text-center w-full max-w-7xl shadow-2xl"><h2 className="text-4xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-orange-200 drop-shadow-2xl">{p.name}</h2></div></div>),
                <BonusSlide key="b-1" isExtra={false} />, 
                <BonusSlide key="b-2" isExtra={true} />,
                <OutroSlide />
            ];

            useEffect(() => {
                let loaded = 0;
                const urls = Array.from(new Set(domeItems.map(it => it.src)));
                
                // 強制結束計時器 (10s)
                const forceStart = setTimeout(() => {
                  if (!isReady) {
                    const pre = document.getElementById('preloader');
                    if (pre) pre.style.opacity = '0';
                    setTimeout(() => { if (pre) pre.style.display = 'none'; setIsReady(true); }, 1000);
                  }
                }, 10000);

                const checkFinish = () => {
                  loaded++;
                  const fill = document.getElementById('loader-fill');
                  if (fill) fill.style.width = Math.min((loaded/urls.length)*100, 100) + '%';
                  if (loaded >= urls.length) {
                    clearTimeout(forceStart);
                    setTimeout(() => {
                      const pre = document.getElementById('preloader');
                      if (pre) pre.style.opacity = '0';
                      setTimeout(() => { if (pre) pre.style.display = 'none'; setIsReady(true); }, 1000);
                    }, 500);
                  }
                };

                urls.forEach(url => {
                    const img = new Image();
                    img.src = url;
                    img.onload = checkFinish;
                    img.onerror = checkFinish;
                });

                return () => clearTimeout(forceStart);
            }, [domeItems]);

            if (!isReady) return null;

            return (
                <div className="relative w-full h-screen bg-[#010401] overflow-hidden select-none animate-fade-in">
                    <div className="fixed top-4 right-4 md:top-8 md:right-8 z-[100] flex items-center gap-4">
                        <BackgroundMusic />
                    </div>
                    <div className="absolute inset-0 z-1 pointer-events-none opacity-60"><div className="aurora-fluid aurora-v1"/><div className="aurora-fluid aurora-v2"/><div className="aurora-fluid aurora-v3"/></div>
                    
                    {allSlides[slide]}

                    <div className="fixed bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 z-50 flex items-center gap-4">
                        <button onClick={()=>setSlide(p=>Math.max(0,p-1))} className="p-4 bg-white/5 md:bg-white/10 rounded-full border border-white/20 active:bg-emerald-500/40"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <div className="flex gap-1.5 flex-wrap justify-center max-w-[200px] md:max-w-[800px]">{allSlides.map((_,i)=><div key={i} className={`w-1 h-1 md:w-1.5 md:h-1.5 rounded-full transition-all ${slide===i ? 'bg-emerald-400 w-3 md:w-6' : 'bg-white/10'}`}/>)}</div>
                        <button onClick={()=>setSlide(p=>Math.min(allSlides.length-1,p+1))} className="p-4 bg-white/5 md:bg-white/10 rounded-full border border-white/20 active:bg-emerald-500/40"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                    </div>
                    
                    {isZoomed && focusedImage && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/98 backdrop-blur-3xl p-4">
                            <div className={`relative max-w-[95vw] max-h-[85vh] md:max-w-6xl md:max-h-[85vh] shadow-2xl rounded-[24px] md:rounded-[32px] border border-white/10 overflow-hidden ${isZoomed ? 'zoom-in-container' : 'zoom-out-container'}`}>
                                <img src={focusedImage.src} className="block w-full h-full object-contain" />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const BackgroundMusic = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const playerRef = useRef(null);
            useEffect(() => {
                window.onYouTubeIframeAPIReady = () => {
                    playerRef.current = new YT.Player('youtube-player', { height: '0', width: '0', videoId: YOUTUBE_VIDEO_ID, playerVars: { autoplay: 1, loop: 1, playlist: YOUTUBE_VIDEO_ID, controls: 0 }, events: { onReady: (e) => { e.target.mute(); e.target.playVideo(); } } });
                };
                if (window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
            }, []);
            const toggle = () => {
                if (!playerRef.current) return;
                if (isPlaying) playerRef.current.mute(); else { playerRef.current.unMute(); playerRef.current.setVolume(50); }
                setIsPlaying(!isPlaying);
            };
            return (
                <button onClick={toggle} className="p-3 bg-white/10 hover:bg-emerald-500/30 border border-white/20 rounded-full transition-all flex items-center gap-3 shadow-2xl">
                    <div id="youtube-player" className="hidden"></div>
                    {isPlaying && <div className="flex items-end h-4">{[0,0.2,0.4,0.1].map((d,i)=><div key={i} className="music-bar" style={{animationDelay:`${d}s`}}/>)}</div>}
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">{isPlaying ? <path d="M9 18V5l12-2v13"></path> : <line x1="1" y1="1" x2="23" y2="23"></line>}</svg>
                </button>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
