<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Century Annual Dinner 2025</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010401;
            overflow: hidden;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: manipulation;
        }

        #preloader {
            position: fixed; inset: 0;
            background-color: #010401;
            z-index: 10000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .loader-bar-bg {
            width: 240px; height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 24px; position: relative;
            overflow: hidden;
        }
        .loader-bar-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            background: #10b981; width: 0%;
            transition: width 0.3s ease;
        }

        .aurora-fluid { 
            position: absolute; 
            width: 140vw; height: 140vh; 
            filter: blur(100px); opacity: 0.5; 
            mix-blend-mode: screen; will-change: transform;
            z-index: 0;
        }
        .aurora-v1 { background: radial-gradient(circle at 20% 20%, #064e3b 0%, transparent 65%); animation: aurora-flow 30s infinite alternate ease-in-out; top: -10%; left: -10%; }
        .aurora-v2 { background: radial-gradient(circle at 80% 80%, #065f46 0%, transparent 65%); animation: aurora-flow 35s infinite alternate-reverse ease-in-out; bottom: -10%; right: -10%; }
        .aurora-v3 { background: radial-gradient(circle at 50% 50%, #0d9488 0%, transparent 55%); animation: aurora-flow 25s infinite alternate ease-in-out; top: 15%; left: 15%; }
        
        .aurora-bonus { background: radial-gradient(circle at 50% 50%, #9a3412 0%, transparent 75%); }

        @keyframes aurora-flow {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(-5%,10%) rotate(-5deg); }
        }

        .text-white-gold {
            background: linear-gradient(to bottom, #ffffff 0%, #fef3c7 45%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
        }

        .text-soft-gold-glow {
            background: linear-gradient(to bottom, #ffffff 0%, #fff9e6 45%, #fef3c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 35px rgba(254, 243, 199, 0.6));
        }

        .text-purple-glow {
            background: linear-gradient(to bottom, #f0abfc, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(168, 85, 247, 0.9));
        }

        .text-emerald-glow {
            background: linear-gradient(to bottom, #ffffff, #6ee7b7, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 60px rgba(16, 185, 129, 0.8));
        }

        .slide-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .slide-item {
            position: absolute; inset: 0;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .slide-active { transform: translateX(0); opacity: 1; z-index: 20; }
        .slide-enter-next { transform: translateX(100%); opacity: 0; }
        .slide-exit-next { transform: translateX(-100%); opacity: 0; }
        .slide-enter-prev { transform: translateX(-100%); opacity: 0; }
        .slide-exit-prev { transform: translateX(100%); opacity: 0; }

        .preserve-3d { transform-style: preserve-3d; }
        .interaction-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.92);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            backdrop-blur: 40px;
        }

        .content-wrapper { transition: filter 2.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; width: 100%; }
        .is-blurred { filter: blur(70px); pointer-events: none; }
        .is-revealed { filter: blur(0px); pointer-events: auto; }

        .liquid-glass-player {
            position: fixed; top: 50%; right: 30px; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 25px 20px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; gap: 20px;
            width: 90px; align-items: center;
        }
        
        .song-btn {
            width: 60px; height: 60px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s;
            font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }
        .song-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
        .song-btn.active {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        .seekbar-container {
            width: 6px; height: 180px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px; position: relative;
            cursor: pointer; overflow: hidden;
        }
        .seekbar-fill {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: #10b981; transition: height 0.1s linear;
        }

        .bonus-box {
            padding: 50px 100px; background: rgba(0,0,0,0.85);
            border: 6px solid #f97316; border-radius: 50px;
            box-shadow: 0 0 40px #f97316, inset 0 0 30px #ea580c;
            animation: bonus-impact 1.2s infinite alternate ease-in-out, bonus-shake 0.3s infinite;
            position: relative; z-index: 100;
        }
        @keyframes bonus-impact { from { transform: scale(0.9) rotate(-1deg); } to { transform: scale(1.1) rotate(1deg); box-shadow: 0 0 150px #f97316, 0 0 50px #fbbf24; } }
        @keyframes bonus-shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(2px, 0px); } }

        .bouncing-text-fx {
            position: absolute; font-weight: 900; white-space: nowrap; user-select: none;
            pointer-events: none; color: #f97316; opacity: 0.3; will-change: transform;
            z-index: 10; filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.5));
        }

        .slide-num-label {
            position: fixed; bottom: 20px; left: 20px; z-index: 100;
            font-size: 10px; color: rgba(255,255,255,0.1); font-weight: bold;
            letter-spacing: 2px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="flex flex-col items-center gap-8">
            <img src="Logo.png" alt="Logo" class="w-32 h-32 object-contain" />
            <div class="flex flex-col items-center">
                <div class="loader-bar-bg"><div id="loader-fill" class="loader-bar-fill"></div></div>
                <div id="loader-text" class="text-[10px] text-emerald-500/60 mt-4 tracking-widest uppercase font-bold animate-pulse">Syncing Ceremony Assets...</div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const BGM_CONFIG = {

            welcome: 'music/welcoming.mp3',
            boss: 'music/bosssentry.mp3',
            misshk: 'music/misshk.mp3',

            masterclass: 'music/masterclass.mp3',

            mark6: 'music/mark6.mp3',
            draw: 'music/14.mp3',
            sb1: 'music/sb1.mp3',
            sb2: 'music/sb2.mp3'
        };

        const MASTER_PHOTO_IDS = [
            "1RqBfC6J0uwVOF2M0q3AbhT8-FtYirG89", "1ZFvMc1gZSX3QTd8CW7kC7hQQW6GGOeA-", "1pSuryx5DNNw4anTZCTRAUP68XrcceVHC", 
            "1mmYJ9aftQ8VK-30za4vCsO_ZBhuhHIym", "1VlR-DVj04vvRNoQOaF2r6OtMEhf5cCQp", "1xilLXHVblUbiNWvkpbMzgbC6hoLLrlke", 
            "13etlXHLNMstt2Vqqvn33xTUQCQENtByr", "1wzSwlRoEu8ohUoUh-1u3kik3GIGOSdCB", "1NWNlzG11Umi1XOuQlbMJKYUMTQrG6xwt", 
            "188yK-EzbN7dNOp0N9wq4MUVO2Z50nO5e", "1-xWAZFmmg6G3DfOEcb28Jnpg4YZtO4YV", "1hLimZFEENvw5jmVKntGN9YGQhK0LOpaE", 
            "1aA9MwZciWVMNdLPLcOpEMb9oP54gf_Eh", "1-lMWx4X22yVe3r8w5CD__gONCHudXkVN", "15fnJvJGdjtfYSCmoCVxNSPmZKTe6tDO3", 
            "1-uO8oKE7Hg5PtXg7VXvy9CgxLXzas_qu", "1kjkszXybmxY2SuJNBqG-1zveuScNiBkM", "1uuhm3ZJdZKU0NYHD7s2fl5mghlaqBSnE", 
            "1qQYWGNJA1wVX9jzqyXNRTvQEaQgbxCCT", "1EFpsb6S0egGq1b1oNpoNyy_GkTUmy3gL", "113hXIubqsHpfOvxesrRPtnkNHsdRZE8V", 
            "1lFt3Ymw6-arcIPePzkOIivUSR3g-gOhA", "1FjIUsay8TsK-00hceVNizS2rJRXGvgvP", "1AAZmAnGXSHzcxSWyZ3UcyxLfCEb84nxw", 
            "11DVFaG1cBWSPnRw0maeJ8sYG54YNZ_uW", "1PwMf2AYgCWHVugUHXdy7For1rwbtr-A8G", "1ORXnJejLTqNEI_5YQYXy5AdNLQwDCbMd", 
            "1YWnjIvwYJgeHBvBR8UWPLrhvVCI14OAT", "1UOnhgGdwF3VZsLO1iUFyYkWFqaJKjUPW", "1RXBF3hCI9NGJF7gS1bkh0QdG8KSsEyGV", 
            "1xBufpe0ojSPqDNSC0ToDzwXLw2hHRsx4", "133N2ALosZBRh7md_VoMYEQe_62CO28-E", "1gEnekpbuGVOKlOLSCFiFSF0xpPTp2a4e", 
            "1kKazZd3rfJzoefw-USdyhqTNBFPpQ4uB", "1KEaRhFsPgBQQwx6bgpKafEnlYZQNu_Oi", "1cj4UgaLi6S17yFn2zeN783z3_VIQHPXU", 
            "17kdoE95toW4pnnps8cd1--nCr3_KOOl7", "1uG42rZ40GqS5nevtevQ4DrV66yzwL0M8", "1Qv5qHXFWxpiP-rf_075fEIoP92aB95cW", 
            "15R6-eCEq8dnoyd9gcF6IkmPQh33KXfos", "1yri2xKHS_Dhg3Nfr_g67FWMNfMoWaD3B",
            "1BMD6mKY-XV7vKM0hBsKYhpTBNDuiJ3YS", "1gyOQNquWmNnCccHV29nRnYY3_VntsFyA", "12jG9zoa45Ypg05x2bcXwgbnt-Zt9o9UN", 
            "1e4XUmyWzlQcZPjfjp3kKhgHhRD2mzY0h", "1bv44skFrzktH9Cs95qSftgvXgSzVunUI", "1fd1Zr6farFLNGBn6nhtElxjBJZA4Q3S-", 
            "11oOHW1pTha-v1lKMjyYUpgT9lkfehS28", "1kI-214ZHFArq_06yVZPWJ7yINqk899A5", "1CyfG2BbeR5IQcSrQhsYRp-vxoAM5Pw8b", 
            "1UkrOmLtm7wZUor9cuAa3J1j9qDgLpDr1"
        ];

        // --- 子組件 ---

        function BouncingTextFX({ text, count = 30 }) {
            const particlesRef = useRef([]);
            if (particlesRef.current.length === 0) {
                particlesRef.current = Array.from({ length: count }).map(() => ({ el: null, x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0 }));
            }
            useEffect(() => {
                const w = window.innerWidth, h = window.innerHeight;
                particlesRef.current.forEach(p => {
                    p.x = Math.random() * (w - 200); p.y = Math.random() * (h - 100);
                    p.vx = (Math.random() - 0.5) * 16; p.vy = (Math.random() - 0.5) * 16;
                    p.rot = Math.random() * 360; p.vr = (Math.random() - 0.5) * 6;
                });
                function animate() {
                    const cw = window.innerWidth, ch = window.innerHeight;
                    particlesRef.current.forEach(p => {
                        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
                        if (p.x < 0 || p.x > cw - 150) p.vx *= -1;
                        if (p.y < 0 || p.y > ch - 50) p.vy *= -1;
                        if (p.el) p.el.style.transform = `translate3d(${p.x}px, ${p.y}px, 0) rotate(${p.rot}deg)`;
                    });
                    requestAnimationFrame(animate);
                }
                const raf = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(raf);
            }, [count]);
            return (
                <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
                    {particlesRef.current.map((p, i) => (
                        <div key={i} ref={el => { if(el) p.el = el; }} className="bouncing-text-fx text-[6vw] md:text-[4vw]">{text}</div>
                    ))}
                </div>
            );
        }

        function GallerySlide({ items, isZoomed, setIsZoomed, setFocusedImage, isActive, onImageError }) {
            const stageRef = useRef(null);
            const rotationRef = useRef(0);
            const [radius, setRadius] = useState(1100);
            useEffect(() => {
                const update = () => setRadius(window.innerWidth < 768 ? 700 : 1100);
                update(); window.addEventListener('resize', update);
                return () => window.removeEventListener('resize', update);
            }, []);
            useEffect(() => {
                if (!isActive) return;
                let timer;
                if (isZoomed) {
                    timer = setTimeout(() => setIsZoomed(false), 2000);
                } else if (items.length > 0) {
                    timer = setTimeout(() => {
                        setFocusedImage({ id: items[Math.floor(Math.random()*items.length)] });
                        setIsZoomed(true);
                    }, 5000);
                }
                return () => clearTimeout(timer);
            }, [isZoomed, isActive, items, setIsZoomed, setFocusedImage]);
            useEffect(() => {
                let raf;
                function animateDome() {
                    if (!isZoomed && stageRef.current) {
                        rotationRef.current += 0.12; 
                        stageRef.current.style.transform = `translate3d(0, 0, ${-radius}px) rotateY(${rotationRef.current}deg)`;
                    }
                    raf = requestAnimationFrame(animateDome);
                }
                raf = requestAnimationFrame(animateDome);
                return () => cancelAnimationFrame(raf);
            }, [isZoomed, radius]);
            if (items.length === 0) return null;
            return (
                <div className="absolute inset-0 flex items-center justify-center [perspective:1200px] z-10 transition-all duration-1000"
                    style={{ transform: isZoomed ? 'scale(0.8) translateZ(-200px)' : 'scale(1)', opacity: isZoomed ? 0.2 : 1 }}>
                    <div ref={stageRef} className="relative w-0 h-0 [transform-style:preserve-3d]">
                        {items.map((id, i) => {
                            const rowSizes = [10, 10, 11, 10, 10]; 
                            let currentRow = 0, currentIdxInRow = 0, countBefore = 0;
                            for(let r=0; r<5; r++){
                                if(i < countBefore + rowSizes[r]){
                                    currentRow = r;
                                    currentIdxInRow = i - countBefore;
                                    break;
                                }
                                countBefore += rowSizes[r];
                            }
                            const yaw = currentIdxInRow * (360 / rowSizes[currentRow]);
                            const pitch = (currentRow - 2) * 15;
                            return (
                                <div key={id} className="absolute w-[210px] h-[135px] md:w-[320px] md:h-[200px] -left-[105px] md:-left-[160px] -top-[67px] md:-top-[100px] [transform-style:preserve-3d]"
                                    style={{ transform: `rotateY(${yaw}deg) rotateX(${-pitch}deg) translateZ(${radius}px)` }}>
                                    <div className="photo-grid-item w-full h-full bg-white/5 rounded-2xl border border-white/20 overflow-hidden shadow-2xl cursor-pointer"
                                         onClick={(e) => { e.stopPropagation(); setFocusedImage({id}); setIsZoomed(true); }}>
                                        <img src={`https://drive.google.com/thumbnail?id=${id}&sz=w1000`} 
                                             className="w-full h-full object-cover opacity-70" 
                                             loading="lazy" onError={() => onImageError(id)} />
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // --- 4. 主程序 ---

        function App() {
            const [slide, setSlide] = useState(0);
            const [dir, setDir] = useState('next');
            const [isReady, setIsReady] = useState(false);
            const [interacted, setInteracted] = useState(false);
            const [isZoomed, setIsZoomed] = useState(false);
            const [focusedImage, setFocusedImage] = useState(null);
            const [isMuted, setIsMuted] = useState(false);
            
            const [deadIds, setDeadIds] = useState(new Set());
            const validPhotoIds = useMemo(() => MASTER_PHOTO_IDS.filter(id => !deadIds.has(id)), [deadIds]);

            const [playlistIndex, setPlaylistIndex] = useState(0);
            const [progress, setProgress] = useState(0);
            const audioRef = useRef(null);
            const currentFileRef = useRef(null);
            const activePlaylist = useMemo(() => ['go', 'breathe', 'masterclass'], []);
            const [assetUrls, setAssetUrls] = useState({});
            const [revealedGroups, setRevealedGroups] = useState([false, false, false]);

            const handleImageError = (id) => setDeadIds(prev => new Set(prev).add(id));

            const seekAudio = (e) => {
                if (!audioRef.current) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const p = 1 - (y / rect.height);
                if (audioRef.current.duration) audioRef.current.currentTime = audioRef.current.duration * p;
            };

            const playAudio = (songKeyOrUrl, loop = true) => {
                const urlSource = BGM_CONFIG[songKeyOrUrl] || songKeyOrUrl;
                const originalUrl = Array.isArray(urlSource) ? urlSource[0] : urlSource;
                const actualUrl = assetUrls[originalUrl] || originalUrl;

                if (currentFileRef.current === originalUrl && audioRef.current && !audioRef.current.paused) return;
                if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
                if (!interacted) return;

                const audio = new Audio(actualUrl);
                audio.muted = isMuted; audio.volume = 1;
                const isSequence = Array.isArray(urlSource) || activePlaylist.includes(songKeyOrUrl);
                audio.loop = isSequence ? false : loop;
                
                if (songKeyOrUrl === 'breathe' || songKeyOrUrl === 'masterclass' || originalUrl.includes('breathe') || originalUrl.includes('masterclass')) {
                    audio.currentTime = 3;
                }

                audio.ontimeupdate = () => {
                    // 更新畫廊區域（含副本）的進度條
                    if ([0, 13, 14, 17, 18, 22, 23].includes(slide)) setProgress((audio.currentTime / audio.duration) * 100);
                };

                audio.onended = () => {
                    if (activePlaylist.includes(songKeyOrUrl)) {
                        setPlaylistIndex(prev => (prev + 1) % activePlaylist.length);
                    } else if (Array.isArray(urlSource) && urlSource.length > 1) {
                        let curIdx = urlSource.indexOf(originalUrl);
                        let nextInSeq = (curIdx + 1) % urlSource.length;
                        playAudio(urlSource[nextInSeq], loop);
                    }
                };

                audio.play().catch(()=>{});
                audioRef.current = audio;
                currentFileRef.current = originalUrl;
            };

            useEffect(() => {
                if (interacted && activePlaylist.includes(activePlaylist[playlistIndex]) && [0, 13, 14, 17, 18, 22, 23].includes(slide)) {
                    playAudio(activePlaylist[playlistIndex]);
                }
            }, [playlistIndex, slide, interacted, assetUrls]);

            const changeSlide = (n) => { setDir(n > slide ? 'next' : 'prev'); setSlide(n); setIsZoomed(false); };

            // 輔助組件：標語頁
            const sloganSlide = (
                <div className="flex flex-col items-center justify-center h-full w-full px-4 text-center">
                    <div className="flex-grow flex flex-col items-center justify-center gap-12">
                        <img src="Logo.png" alt="Logo" className="w-full max-w-4xl h-auto drop-shadow-2xl" />
                        <div className="flex flex-col gap-2">
                            <h1 className="text-4xl md:text-7xl font-light text-white-gold tracking-widest uppercase">Annual Dinner</h1>
                            <div className="text-orange-300 text-xl md:text-3xl font-medium tracking-[0.5em] mt-4">2 0 2 5</div>
                        </div>
                        <div className="flex flex-col gap-6 text-[8.5vw] md:text-[5.5rem] font-black text-white-gold drop-shadow-2xl mt-4">
                            <span className="whitespace-nowrap leading-tight">冠世風華廿二載</span>
                            <span className="whitespace-nowrap leading-tight">恒守初心志未改</span>
                        </div>
                    </div>
                </div>
            );

            const lsaTitle = (
                <div className="h-full text-center px-6 flex flex-col justify-center items-center">
                    <h2 className="text-6xl md:text-[9rem] font-bold text-white-gold tracking-[0.15em] mb-4 uppercase leading-none">長期服務獎</h2>
                    <span className="text-emerald-500/80 text-2xl md:text-5xl font-light uppercase italic tracking-widest leading-none">Long Service Award</span>
                </div>
            );

            const gameTitle = (num, name, engName) => (
                <div className="flex flex-col items-center justify-center h-full text-center gap-4">
                    <span className="text-emerald-400 text-4xl md:text-6xl font-bold uppercase tracking-widest">GAME {num}</span>
                    <h2 className="text-7xl md:text-[12rem] font-black text-white drop-shadow-2xl uppercase leading-tight">{name}</h2>
                    {engName && <span className="text-white/40 text-3xl md:text-6xl uppercase font-medium italic tracking-widest">{engName}</span>}
                </div>
            );

            const allSlides = [
                /* 0 */ <GallerySlide items={validPhotoIds} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} isActive={slide === 0} onImageError={handleImageError} />,
                /* 1 */ sloganSlide,
                /* 2 */ <div className="flex flex-col h-full items-center justify-center gap-12 px-6"><div className="text-center"><h1 className="text-6xl md:text-9xl font-bold text-white-gold tracking-[0.5em] uppercase">致詞</h1><span className="text-emerald-400 text-2xl md:text-4xl font-light mt-2 block uppercase">Speech</span></div><div className="flex flex-col items-center gap-10 md:gap-16 text-[8vw] md:text-8xl font-medium text-white drop-shadow-2xl text-center"><span className="whitespace-nowrap">Morris & Mikey</span><div className="h-[2px] w-48 md:w-96 bg-white/20" /><span>Teddy & Kanji</span></div></div>,
                /* 3 */ lsaTitle,
                /* 4 */ <div className="h-full text-center px-6 flex flex-col justify-center items-center"><span className="text-white-gold text-6xl md:text-[10rem] font-black mb-12">10 Years</span><span className="text-5xl md:text-9xl font-medium text-white">David Tsang</span></div>,
                /* 5 */ <div className="h-full text-center px-6 flex flex-col justify-center items-center"><span className="text-white-gold text-6xl md:text-[10rem] font-black mb-12">15 Years</span><span className="text-5xl md:text-9xl font-medium text-white">Kanji Kwok</span></div>,
                /* 6 */ <div className="h-full text-center px-6 flex flex-col justify-center items-center"><span className="text-white-gold text-6xl md:text-[10rem] font-black mb-12">20 Years</span><div className="flex flex-col gap-6"><span className="text-5xl md:text-9xl font-medium text-white">Kason Lau</span><span className="text-5xl md:text-9xl font-medium text-white">Steven Ngai</span></div></div>,
                /* 7 */ <div className="h-full text-center px-6 flex flex-col justify-center items-center"><span className="text-white-gold text-6xl md:text-[10rem] font-black mb-12">25 Years</span><span className="text-5xl md:text-9xl font-medium text-white">Wilson Chang</span></div>,
                /* 8 */ lsaTitle,
                /* 9 */ <div className="h-full text-center flex flex-col justify-center items-center"><h2 className="text-[15vw] md:text-[15rem] font-black italic text-emerald-glow tracking-tighter uppercase leading-none animate-pulse">GAME TIME!</h2></div>,
                /* 10 */ gameTitle(1, "圍獎"),
                /* 11 */ <div className="h-full text-center px-6 flex flex-col justify-center items-center w-full max-w-none px-12 md:px-24"><div className="flex flex-col items-center gap-12 w-full"><p className="text-4xl md:text-7xl font-bold text-white opacity-90 uppercase">被抽中的枱號，每人皆可獲得</p><p className="text-xl md:text-4xl text-white/40 uppercase tracking-widest italic">Every guest wins when their table number is drawn!</p><span className="text-purple-glow font-black text-9xl md:text-[18rem] mt-12 shadow-2xl">豐富獎品</span><span className="text-purple-400/60 text-3xl md:text-7xl uppercase font-bold tracking-widest italic mt-4 uppercase">Fabulous Prizes</span></div></div>,
                /* 12 */ <div className="flex flex-col h-full items-center justify-center text-center gap-12 w-full max-w-8xl mx-auto px-6"><div className="text-left w-full"><span className="text-yellow-500 text-4xl md:text-7xl font-bold uppercase italic">唔係講笑...</span><p className="text-white/40 text-2xl md:text-4xl uppercase italic font-medium mt-4">Seriously...</p></div><div className="flex flex-col gap-8"><h2 className="text-7xl md:text-[12rem] font-black tracking-wider text-soft-gold-glow leading-tight">今晚獎金、獎品<br />非常豐富！！</h2><p className="text-white/40 text-3xl md:text-6xl uppercase font-medium">Massive prizes & cash await!!</p></div></div>,
                /* 13: Dome 2 */ <GallerySlide items={validPhotoIds} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} isActive={slide === 13} onImageError={handleImageError} />,
                /* 14: Slogan Dup 1 */ sloganSlide,
                /* 15: Game 2 Title */ gameTitle(2, "競飲"),
                /* 16: Game 2 Content */ <div className="h-full px-6 flex flex-col justify-center items-center w-full max-w-none px-12 md:px-24"><div className="grid grid-cols-1 md:grid-cols-3 gap-16 mb-12 w-full h-[300px] md:h-[500px]">{[1,2,3].map((g, idx) => {const groupData = ["2, 5, 8, 11, 15, 18", "1, 6, 9, 12, 16, 19", "3, 7, 10, 13, 17"]; return (<div key={idx} className="flex flex-col h-full flex-1 relative"><div onClick={() => { const n = [...revealedGroups]; n[idx] = true; setRevealedGroups(n); }} className={`flex-grow bg-white/5 border border-white/10 p-12 rounded-[40px] cursor-pointer transition-all duration-1000 flex flex-col justify-center items-center shadow-2xl ${revealedGroups[idx] ? 'blur-0 bg-white/10' : 'blur-2xl'}`}><p className="text-yellow-500 text-2xl font-bold uppercase mb-4">Group {g}</p><p className="text-white text-4xl md:text-6xl font-black text-center">{groupData[idx]}</p></div><div className="mt-8 text-emerald-500 animate-bounce flex justify-center text-6xl">↓</div><div className="w-full bg-white/5 border border-white/20 py-8 rounded-3xl text-center mt-4 shadow-lg"><span className="text-3xl md:text-5xl font-black text-white uppercase opacity-90 block">晉級</span><span className="text-sm md:text-lg text-white/50 uppercase font-bold tracking-tighter">PROMOTED</span></div></div>); })}</div><div className="mt-24 flex flex-col items-center px-16 py-12 md:px-64 md:py-20 bg-gradient-to-r from-emerald-600/30 to-emerald-400/30 border-2 border-emerald-400/60 rounded-[60px] shadow-[0_0_120px_rgba(16,185,129,0.2)]"><span className="text-6xl md:text-[12rem] font-black text-purple-glow uppercase leading-none">冠・亞・季</span><span className="text-3xl md:text-6xl text-white/80 font-medium italic uppercase mt-10">Champion • 1st • 2nd Runner-up</span></div></div>,
                /* 17: Dome 3 */ <GallerySlide items={validPhotoIds} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} isActive={slide === 17} onImageError={handleImageError} />,
                /* 18: Slogan Dup 2 */ sloganSlide,
                /* 19: Game 3 Title */ gameTitle(3, "幸運Mark 6", "Lucky Mark 6"),
                /* 20: Game 3 Rules */ <div className="h-full px-6 flex flex-col justify-center items-center w-full max-w-none px-12 md:px-24"><div className="w-full transform -translate-y-8 text-left"><div className="space-y-12 md:space-y-20 pl-12 border-l-8 border-emerald-500/50"><div className="flex flex-col gap-4"><div className="flex items-center gap-12"><div className="w-16 h-16 md:w-24 md:h-24 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-4xl">1</div><p className="text-4xl md:text-7xl font-bold text-white leading-tight">每人手上已有一張「六合彩飛」</p></div><p className="text-white/40 text-2xl md:text-4xl ml-28 md:ml-36 uppercase font-medium">Each guest holds a "Mark Six" ticket.</p></div><div className="flex flex-col gap-4"><div className="flex items-center gap-12"><div className="w-16 h-16 md:w-24 md:h-24 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-4xl">2</div><p className="text-4xl md:text-7xl font-bold text-white leading-tight">會播出過往其中一期六合彩攪珠片段</p></div><p className="text-white/40 text-2xl md:text-4xl ml-28 md:ml-36 uppercase font-medium">Replaying one of the past mark six lottery.</p></div><div className="flex flex-col gap-4"><div className="flex items-center gap-12"><div className="w-16 h-16 md:w-24 md:h-24 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-4xl">3</div><p className="text-4xl md:text-7xl font-bold text-white leading-tight">最快集齊 <span class='text-emerald-400 font-black text-5xl md:text-[9rem]'>6</span> 組號碼</p></div><p className="text-white/40 text-2xl md:text-4xl ml-28 md:ml-36 uppercase font-medium">First to complete 6 sets of numbers wins!</p></div><div className="p-12 md:p-20 bg-red-600/20 border-4 border-red-500/30 rounded-[50px] mt-16 shadow-2xl flex flex-col gap-6 text-center"><p className="text-4xl md:text-8xl font-black text-red-500 tracking-wider uppercase leading-none">名額五個，記得盡快舉手行出嚟喇！</p><p className="text-2xl md:text-5xl font-bold text-red-400/60 uppercase">Only 5 winners! Raise your hand ASAP!</p></div></div></div></div>,
                /* 21: Bingo Result */ <div className="flex flex-col items-center justify-center h-full text-center gap-10 px-6"><h2 className="text-6xl md:text-8xl font-black text-white-gold uppercase tracking-widest">LUCKY MARK 6 RESULT</h2><div className="flex flex-col gap-8 bg-white/5 border border-white/10 p-12 md:p-16 rounded-[50px] shadow-2xl backdrop-blur-md max-w-7xl"><div className="space-y-2"><p className="text-4xl md:text-6xl font-bold text-emerald-400">2026年2月3日（第十四期）</p><p className="text-xl md:text-3xl text-emerald-400/60 uppercase font-medium">February 3, 2026 (No. 14)</p></div><div className="h-[1px] w-full bg-white/10" /><div className="space-y-4"><p className="text-3xl md:text-5xl font-medium text-white/90">派彩號碼為 <span className="text-yellow-400 font-black underline underline-offset-8">42、39、23、27、12及37</span></p><p className="text-xl md:text-3xl text-white/40 uppercase font-medium">Winning Numbers: <span className="text-yellow-400/80">42, 39, 23, 27, 12 & 37</span></p></div></div></div>,
                /* 22: Dome 4 */ <GallerySlide items={validPhotoIds} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} isActive={slide === 22} onImageError={handleImageError} />,
                /* 23: Slogan Dup 2 */ sloganSlide,
                /* 24: Draw Title */ <div className="h-full text-center flex flex-col justify-center items-center"><h2 className="text-8xl md:text-[15rem] font-black text-white-gold leading-none py-8 uppercase">抽獎環節</h2><span className="text-white/60 text-4xl md:text-7xl font-light uppercase mt-6 italic tracking-widest leading-none">Lucky Draw Session</span></div>,
                /* 25: Bonus */ <div className="h-full flex items-center justify-center overflow-hidden relative w-full"><BouncingTextFX text="加碼" count={30} /><div className="absolute inset-0 aurora-bonus blur-[120px] opacity-60" /><div className="bonus-box z-10 text-center shadow-[0_0_100px_rgba(249,115,22,0.8)]"><h2 className="text-7xl md:text-[15rem] font-black text-orange-500 italic uppercase leading-none">加碼！！</h2></div></div>,
                /* 26: Re-bonus */ <div className="h-full flex items-center justify-center overflow-hidden relative w-full"><BouncingTextFX text="再加碼" count={30} /><div className="absolute inset-0 aurora-bonus blur-[120px] opacity-60" /><div className="bonus-box z-10 text-center border-[#ea580c] shadow-[0_0_120px_rgba(234,88,12,0.8)]"><h2 className="text-7xl md:text-[15rem] font-black text-[#ea580c] italic uppercase leading-none">再加碼！！</h2></div></div>,
                /* 27: Thank you */ <div className="flex flex-col items-center justify-center h-full text-center gap-12 px-6"><h2 className="text-5xl md:text-9xl lg:text-[11rem] font-bold text-white tracking-widest italic drop-shadow-2xl leading-none">感謝各位蒞臨</h2><div className="flex flex-col gap-4"><p className="text-2xl md:text-5xl lg:text-[6.5rem] font-bold text-white/90 whitespace-nowrap tracking-wider uppercase">2026 冠恒集團春茗</p><p className="text-2xl md:text-5xl lg:text-[6.5rem] font-bold text-white/90 whitespace-nowrap tracking-wider leading-snug uppercase">圓滿結束</p></div><h3 className="text-6xl md:text-9xl lg:text-[13rem] font-black text-yellow-400 italic animate-pulse mt-6 uppercase leading-none">下年再見!</h3></div>
            ];

            useEffect(() => {
                if (!isReady || !interacted) return;
                const i = slide;
                if (i === 1) playAudio('welcome');
                else if (i === 2) playAudio('boss');
                else if (i >= 3 && i <= 8) playAudio('misshk');
                else if (i >= 9 && i <= 12) playAudio('ukulele');
                else if (i >= 15 && i <= 16) playAudio(BGM_CONFIG.game2Seq);
                else if (i >= 19 && i <= 21) playAudio('mark6');
                else if (i === 24) playAudio('draw'); 
                else if (i === 25) playAudio('sb1'); 
                else if (i === 26) playAudio('sb2'); 
                else if (i === 27) playAudio('breathe'); 
                else if (![0, 13, 14, 17, 18, 22, 23].includes(i)) { 
                    if(audioRef.current) audioRef.current.pause(); 
                    currentFileRef.current = null; 
                }
            }, [slide, interacted, isReady, assetUrls]);

            // 強制預載
            useEffect(() => {
                const imgU = MASTER_PHOTO_IDS.map(id => `https://drive.google.com/thumbnail?id=${id}&sz=w1000`);
                const audU = Object.values(BGM_CONFIG).flat();
                const total = imgU.length + audU.length;
                let loadedCount = 0;
                const check = () => {
                    loadedCount++;
                    const fill = document.getElementById('loader-fill');
                    if (fill) fill.style.width = (loadedCount / total * 100) + '%';
                    if (loadedCount >= total) {
                        const pre = document.getElementById('preloader'); 
                        if (pre) pre.style.opacity = '0';
                        setTimeout(() => { if (pre) pre.style.display = 'none'; setIsReady(true); }, 1000);
                    }
                };
                imgU.forEach((u, idx) => {
                    const img = new Image();
                    img.src = u;
                    img.onload = check;
                    img.onerror = () => {
                        setDeadIds(prev => new Set(prev).add(MASTER_PHOTO_IDS[idx]));
                        check();
                    };
                });
                audU.forEach(u => {
                    fetch(u)
                        .then(res => res.blob())
                        .then(blob => {
                            const blobUrl = URL.createObjectURL(blob);
                            setAssetUrls(prev => ({ ...prev, [u]: blobUrl }));
                            check();
                        })
                        .catch(() => check());
                });
                const timer = setTimeout(() => { if (!isReady) setIsReady(true); }, 60000);
                return () => clearTimeout(timer);
            }, []);

            if (!isReady) return null;

            return (
                <div className="relative w-full h-screen bg-[#010401] overflow-hidden select-none">
                    {!interacted && (
                        <div className="interaction-overlay" onClick={() => setInteracted(true)}>
                            <img src="Logo.png" alt="Logo" className="w-48 h-48 object-contain mb-8 animate-pulse" />
                            <h2 className="text-3xl font-bold tracking-[0.5em] text-white-gold mb-4 uppercase">歡迎進入</h2>
                            <p className="text-emerald-400 tracking-[0.3em] animate-bounce text-center">TAP TO START CEREMONY</p>
                        </div>
                    )}
                    <div className={`content-wrapper h-full w-full ${!interacted ? 'is-blurred' : 'is-revealed'}`}>
                        <div className="fixed top-6 left-6 z-[100]"><button onClick={() => setIsMuted(!isMuted)} className="p-3 bg-white/10 border border-white/20 rounded-full shadow-2xl backdrop-blur-md">{isMuted ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg> : <div className="flex items-center gap-2"><div className="flex items-end h-3 gap-0.5">{[0.1, 0.4, 0.2, 0.5].map((d, i) => (<div key={i} className="w-0.5 bg-yellow-400 animate-bounce" style={{ height: '100%', animationDelay: `${d}s` }} />))}</div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></div>}</button></div>
                        <div className="slide-num-label">{slide + 1} / {allSlides.length}</div>
                        
                        {/* Music UI 顯示邏輯：畫廊及其後的標語頁 */}
                        {([13, 14, 17, 18, 22, 23].includes(slide)) && interacted && (
                            <div className="liquid-glass-player">
                                {activePlaylist.map((k, idx) => (
                                    <button key={k} onClick={() => { currentFileRef.current = null; setPlaylistIndex(idx); }} className={`song-btn ${playlistIndex === idx ? 'active' : ''}`}>{k === 'go' ? 'Go' : k === 'breathe' ? 'Air' : 'MC'}</button>
                                ))}
                                <div className="seekbar-container" onClick={seekAudio}>
                                    <div className="seekbar-fill" style={{ height: `${progress}%` }} />
                                </div>
                            </div>
                        )}

                        <div className="absolute inset-0 z-0 pointer-events-none opacity-100"><div className="aurora-fluid aurora-v1"/><div className="aurora-fluid aurora-v2"/><div className="aurora-fluid aurora-v3"/></div>
                        <div className="slide-container">
                            {allSlides.map((content, idx) => (
                                <div key={idx} className={`slide-item ${idx === slide ? 'slide-active' : (idx < slide ? (dir === 'next' ? 'slide-exit-next' : 'slide-enter-prev') : (dir === 'next' ? 'slide-enter-next' : 'slide-exit-prev'))}`} style={{ visibility: Math.abs(idx - slide) > 1 ? 'hidden' : 'visible' }}>{content}</div>
                            ))}
                        </div>
                        <div className="fixed bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 z-50 flex items-center gap-4">
                            <button onClick={()=>changeSlide(Math.max(0, slide-1))} className="p-4 bg-white/5 md:bg-white/10 rounded-full border border-white/20 active:bg-emerald-500/40 transition-all shadow-lg pointer-events-auto"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                            <div className="flex gap-1.5 flex-wrap justify-center max-w-[200px] md:max-w-[800px]">{allSlides.map((_,i)=><div key={i} className={`w-1 h-1 md:w-1.5 md:h-1.5 rounded-full transition-all ${slide===i ? 'bg-yellow-400 w-3 md:w-6' : 'bg-white/10'}`}/>)}</div>
                            <button onClick={()=>changeSlide(Math.min(allSlides.length-1, slide+1))} className="p-4 bg-white/5 md:bg-white/10 rounded-full border border-white/20 active:bg-emerald-500/40 transition-all shadow-lg pointer-events-auto"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                        </div>
                    </div>
                    {isZoomed && focusedImage && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/98 backdrop-blur-3xl p-4" onClick={() => setIsZoomed(false)}>
                            <div className={`relative max-w-[95vw] max-h-[85vh] md:max-w-6xl md:max-h-[85vh] shadow-2xl rounded-[32px] border border-white/10 overflow-hidden zoom-in-container`}><img src={`https://drive.google.com/thumbnail?id=${focusedImage.id}&sz=w1000`} className="block w-full h-full object-contain" /><div className="absolute top-4 right-4 p-2 bg-black/40 text-white rounded-full">✕</div></div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
