<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Century Holdings Limited - Annual Dinner 2025</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010401;
            overflow: hidden;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #preloader {
            position: fixed; inset: 0;
            background-color: #010401;
            z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out;
        }
        .loader-bar-bg {
            width: 240px; height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 24px; position: relative;
            overflow: hidden; border-radius: 2px;
        }
        .loader-bar-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            background: #10b981; width: 0%;
            transition: width 0.3s ease;
        }

        .aurora-fluid { 
            position: absolute; 
            width: 140vw; height: 140vh; 
            filter: blur(100px); opacity: 0.5; 
            mix-blend-mode: screen; will-change: transform;
        }
        .aurora-v1 { background: radial-gradient(circle at 20% 20%, #064e3b 0%, transparent 65%); animation: aurora-flow 30s infinite alternate ease-in-out; top: -10%; left: -10%; }
        .aurora-v2 { background: radial-gradient(circle at 80% 80%, #065f46 0%, transparent 65%); animation: aurora-flow 35s infinite alternate-reverse ease-in-out; bottom: -10%; right: -10%; }
        .aurora-v3 { background: radial-gradient(circle at 50% 50%, #0d9488 0%, transparent 55%); animation: aurora-flow 25s infinite alternate ease-in-out; top: 15%; left: 15%; }
        
        @keyframes aurora-flow {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(-5%,10%) rotate(-5deg); }
        }

        @keyframes fadeInMove {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-phase-1 { animation: fadeInMove 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .anim-phase-2 { opacity: 0; animation: fadeInMove 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards; }
        .anim-speech-names { opacity: 0; animation: fadeInMove 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; }
        .animate-slide-up { animation: fadeInMove 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .preserve-3d { transform-style: preserve-3d; }

        .music-bar {
            width: 3px; background: #10b981; margin: 0 1px;
            animation: music-bounce 1s ease-in-out infinite;
        }
        @keyframes music-bounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }

        .gift-number { font-family: 'Georgia', serif; font-style: italic; }

        @keyframes bonus-pop {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .bonus-item { animation: bonus-pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="flex flex-col items-center gap-6">
            <img src="GC.png" alt="GC Logo" class="w-24 h-24 object-contain" />
            <div class="loader-bar-bg"><div id="loader-fill" class="loader-bar-fill"></div></div>
            <div id="loader-text" class="text-[10px] text-emerald-500/60 tracking-widest uppercase font-medium">Downloading Assets...</div>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- 1. 配置與工具 ---
        const YOUTUBE_VIDEO_ID = 'jfKfPfyJRdk'; 
        const FIXED_RADIUS = 1100; 

        const DRIVE_IDS = [
            '1_UDb1eM70zzDceSal-FoVtGG5gKvC2G5',
            '1C3rOoEzaVnu4n43vEirqvUiXJ0ooLmPW',
            '1MkJ9nGP7JuR9ykoZOo5Dt4WD8mhMn9TD',
            '1D3PQIbYFjWSkOlR1mSPpJJYSObEQwPCY'
        ];

        const INITIAL_IMAGES = DRIVE_IDS.map(id => ({
            src: `https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
            alt: 'Archive'
        }));

        const PRIZES = [
            { id: 1, name: "TCL 65\" TV" },
            { id: 2, name: "SAMSUNG TV 55\"" }, 
            { id: 3, name: "SAMSUNG TV 55\"" }, 
            { id: 4, name: "Apple Mac mini" },
            { id: 5, name: "MYTREX MIRAY ONE美容儀" },
            { id: 6, name: "ASUS ROG XBOX ALLY" },
            { id: 7, name: "B&O A1 3rd Gen" },
            { id: 8, name: "TP Link Tri-Band Wi-Fi 7 Router" },
            { id: 9, name: "TP Link Wi-Fi 7 電競路由器" },
            { id: 10, name: "LENOVO Idea Tab Pen & Case" },
            { id: 11, name: "Sennheiser Momentum TW 4" },
            { id: 12, name: "Sennheiser Momentum TW 4" }
        ];

        function buildItems(pool, count) {
            const items = [];
            const rows = 6; 
            const itemsPerRow = Math.ceil(count / rows);
            const horizontalStep = 360 / itemsPerRow; 
            const verticalStep = 11; 
            for (let i = 0; i < count; i++) {
                const rowIndex = (i % rows) - (rows - 1) / 2;
                const colIndex = Math.floor(i / rows);
                items.push({ yaw: colIndex * horizontalStep, pitch: rowIndex * verticalStep, src: pool[i % pool.length].src, alt: pool[i % pool.length].alt });
            }
            return items;
        }

        // --- 2. 組件系統 ---

        const GallerySlide = ({ items, radius, isZoomed, setFocusedImage, setIsZoomed }) => {
            const stageRef = useRef(null);
            const rotationRef = useRef({ targetY: 0, currentY: 0 });
            const draggingRef = useRef(false);
            const lastMousePos = useRef({ x: 0 });

            useEffect(() => {
                const animate = () => {
                    if (!isZoomed) {
                        if (!draggingRef.current) rotationRef.current.targetY += 0.15; 
                        rotationRef.current.currentY += (rotationRef.current.targetY - rotationRef.current.currentY) * 0.08;
                        if (stageRef.current) stageRef.current.style.transform = `translate3d(0, 0, ${-radius}px) rotateY(${rotationRef.current.currentY}deg)`;
                    }
                    requestAnimationFrame(animate);
                };
                const raf = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(raf);
            }, [isZoomed, radius]);

            return (
                <div className="absolute inset-0 flex items-center justify-center [perspective:1800px] z-10 touch-none"
                    onPointerDown={(e) => { draggingRef.current = true; lastMousePos.current.x = e.clientX; }}
                    onPointerMove={(e) => { if (draggingRef.current) { rotationRef.current.targetY += (e.clientX - lastMousePos.current.x) * 0.15; lastMousePos.current.x = e.clientX; } }}
                    onPointerUp={() => draggingRef.current = false}>
                    <div ref={stageRef} className="relative w-0 h-0 preserve-3d will-change-transform">
                        {items.map((it, i) => (
                            <div key={i} className="absolute w-[220px] h-[140px] -left-[110px] -top-[70px] preserve-3d" style={{ transform: `rotateY(${it.yaw}deg) rotateX(${-it.pitch}deg) translateZ(${radius}px)` }}>
                                <div className="group relative w-full h-full cursor-pointer p-[1px] rounded-lg transition-transform duration-500 hover:scale-110" onClick={() => { setFocusedImage(it); setIsZoomed(true); }}>
                                    <div className="absolute inset-0 rounded-lg bg-white/10 border border-white/10" />
                                    <div className="relative w-full h-full overflow-hidden rounded-md bg-black/40"><img src={it.src} alt={it.alt} className="w-full h-full object-cover opacity-60 group-hover:opacity-100" loading="lazy" /></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const SloganSlide = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-4">
                <div className="flex flex-col items-center w-full transform -translate-y-8">
                    <div className="anim-phase-1 flex flex-col items-center mb-2">
                        <img src="GC.png" alt="Logo" className="w-[800px] object-contain drop-shadow-2xl" />
                        <div className="relative flex flex-col items-center mt-4">
                            <h1 className="text-5xl md:text-8xl font-light tracking-[0.15em] text-transparent bg-clip-text bg-gradient-to-r from-yellow-100 via-orange-300 to-yellow-200 text-center leading-tight">ANNUAL DINNER</h1>
                            <div className="w-full flex items-center gap-4 mt-2"><span className="text-orange-300/80 text-base tracking-[0.5em] font-medium">2 0 2 5</span><div className="h-[1px] flex-1 bg-gradient-to-r from-orange-300/50 to-transparent" /></div>
                        </div>
                    </div>
                    <div className="anim-phase-2 flex flex-col gap-1 items-center w-full mt-8">
                        <div className="flex justify-center whitespace-nowrap leading-none"><span className="text-[10vw] md:text-[5.5rem] font-black text-orange-200/95 tracking-[0.05em] drop-shadow-2xl">冠世風華廿二載</span></div>
                        <div className="flex justify-center whitespace-nowrap leading-none"><span className="text-[10vw] md:text-[5.5rem] font-black text-orange-200/95 tracking-[0.05em] drop-shadow-2xl">恆守初心志未改</span></div>
                    </div>
                </div>
            </div>
        );

        const SpeechSlide = ({ name1, name2 }) => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6">
                <div className="flex items-center justify-center w-full max-w-7xl transform -translate-y-8">
                    <div className="flex items-center justify-center gap-[120px]">
                        <div className="anim-phase-1 flex flex-col items-center text-center w-[250px]">
                            <div className="flex gap-16 mb-2">
                                <span className="text-5xl md:text-8xl font-bold text-orange-200/90 tracking-[0.5em] drop-shadow-lg">致</span>
                                <span className="text-5xl md:text-8xl font-bold text-orange-200/90 tracking-[0.5em] drop-shadow-lg">詞</span>
                            </div>
                            <span className="text-orange-400/60 text-xl md:text-3xl font-light tracking-[0.3em] uppercase">Speech</span>
                        </div>
                        {/* 名字間隔 200px (約 5cm) */}
                        <div className="anim-speech-names flex items-center whitespace-nowrap gap-[200px]">
                            <span className="text-5xl md:text-8xl font-medium text-orange-300 tracking-wide drop-shadow-2xl">{name1}</span>
                            <span className="text-5xl md:text-8xl font-medium text-orange-300 tracking-wide drop-shadow-2xl">{name2}</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        const AwardTitleSlide = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                <div className="flex flex-col items-center transform -translate-y-8 text-center">
                    <h2 className="text-6xl md:text-[8rem] font-bold text-orange-200/95 tracking-[0.2em] drop-shadow-2xl mb-4 leading-tight">長期服務獎</h2>
                    <span className="text-orange-400/60 text-2xl md:text-5xl font-light tracking-[0.4em] uppercase">Long Service Award</span>
                </div>
            </div>
        );

        const ServiceYearSlide = ({ years, names }) => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6">
                <div className="flex flex-col items-center transform -translate-y-12 w-full max-w-6xl">
                    <div className="anim-phase-1 flex flex-col items-center mb-16">
                        <span className="text-orange-200/90 text-5xl md:text-8xl font-black tracking-widest drop-shadow-lg">{years} Years</span>
                        <div className="h-[2px] w-64 bg-gradient-to-r from-transparent via-orange-400 to-transparent mt-4"></div>
                    </div>
                    <div className="anim-speech-names flex flex-col items-center gap-6">
                        {names.split(',').map((name, i) => (
                            <span key={i} className="text-5xl md:text-[7rem] font-medium text-orange-300 tracking-wider drop-shadow-2xl text-center">{name.trim()}</span>
                        ))}
                    </div>
                </div>
            </div>
        );

        const GameTimeTitleSlide = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                <div className="flex flex-col items-center transform -translate-y-8 pr-12 overflow-visible">
                    <h2 className="text-8xl md:text-[14rem] font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-yellow-200 via-emerald-400 to-emerald-600 drop-shadow-[0_20px_60px_rgba(16,185,129,0.5)] leading-tight whitespace-nowrap py-4">
                        GAME TIME!
                    </h2>
                </div>
            </div>
        );

        const CompetitionSlide = () => {
            const GroupBox = ({ title, tables }) => (
                <div className="flex flex-col items-center">
                    <div className="w-full bg-emerald-900/30 border border-emerald-500/40 p-4 rounded-xl backdrop-blur-md shadow-2xl text-center">
                        <span className="block text-emerald-400 font-bold mb-3 text-2xl uppercase tracking-wider">{title}</span>
                        <p className="text-white text-3xl md:text-5xl font-black tracking-widest">{tables}</p>
                    </div>
                    <div className="my-4 text-emerald-500/60">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                    </div>
                    <div className="w-48 bg-white/5 border border-white/20 py-4 rounded-lg text-center"><span className="text-2xl md:text-3xl font-black text-orange-200 uppercase">晉級</span></div>
                </div>
            );
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                    <div className="w-full max-w-7xl transform -translate-y-4">
                        <div className="w-full flex justify-between items-end mb-12 border-b border-white/10 pb-4">
                            <div className="flex flex-col items-start"><span className="text-orange-200/90 text-4xl md:text-6xl font-bold tracking-wide">Game 2</span></div>
                            <div className="text-right"><span className="text-orange-300 text-5xl md:text-7xl font-bold tracking-[0.2em] uppercase">競飲</span></div>
                        </div>
                        <div className="grid grid-cols-3 gap-8 md:gap-16 mb-8">
                            <GroupBox title="Group 1" tables="1, 2, 3, 5, 6, 7" />
                            <GroupBox title="Group 2" tables="8, 9, 10, 11, 12, 13" />
                            <GroupBox title="Group 3" tables="15, 16, 17, 18, 19" />
                        </div>
                        <div className="flex flex-col items-center mt-4">
                            <div className="px-24 py-8 bg-gradient-to-r from-orange-600/40 via-orange-400/40 to-orange-600/40 border-2 border-orange-400/60 rounded-2xl shadow-[0_0_50px_rgba(251,146,60,0.4)]">
                                <span className="text-4xl md:text-7xl font-bold text-white tracking-[0.5em] drop-shadow-2xl">冠・亞・季</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const BingoSlide = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                <div className="w-full max-w-6xl transform -translate-y-12">
                    <div className="w-full flex justify-between items-end mb-16 border-b border-white/10 pb-4">
                        <div className="flex flex-col items-start"><span className="text-orange-200/90 text-4xl md:text-6xl font-bold tracking-wide">Game 3</span></div>
                        <div className="text-right pr-8"><span className="text-orange-300 text-6xl md:text-9xl font-black italic tracking-tighter drop-shadow-[0_0_30px_rgba(251,146,60,0.5)]">BINGO!</span></div>
                    </div>
                    <div className="flex flex-col items-start gap-8 md:gap-10 pl-10 border-l-4 border-emerald-500/50">
                        <div className="flex items-center gap-6"><div className="w-12 h-12 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-2xl">1</div><p className="text-3xl md:text-5xl font-bold text-orange-100 tracking-wide">每人手上已有一張「六合彩飛」</p></div>
                        <div className="flex items-center gap-6"><div className="w-12 h-12 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-2xl">2</div><p className="text-3xl md:text-5xl font-bold text-orange-100 tracking-wide">MC會從 1 - 49 號中抽數字</p></div>
                        <div className="flex items-center gap-6"><div className="w-12 h-12 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-2xl">3</div><p className="text-3xl md:text-5xl font-bold text-orange-100 tracking-wide">直至凑成 <span className="text-emerald-400 text-6xl px-4">4</span> 組號碼</p></div>
                        <div className="flex items-center gap-6"><div className="w-12 h-12 bg-red-500 text-white rounded-full flex items-center justify-center font-black text-2xl">!</div><p className="text-3xl md:text-5xl font-black text-red-400 tracking-widest bg-white/5 px-6 py-2 rounded-lg">最快抽齊者：立即舉手行出嚟！</p></div>
                    </div>
                </div>
            </div>
        );

        const PrizeListSlide = ({ start, end }) => {
            const list = [...PRIZES].reverse().slice(start, end);
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                    <div className="w-full max-w-4xl transform -translate-y-4">
                        <div className="mb-6 text-center"><span className="text-3xl md:text-5xl font-bold text-orange-200">獎品清單 Prize List</span></div>
                        <div className="grid grid-cols-1 gap-2">
                            {list.map((p, i) => (
                                <div key={i} className="flex items-center gap-4 bg-white/5 p-3 rounded-xl border border-white/10">
                                    <span className="gift-number text-xl md:text-2xl font-black text-emerald-500 opacity-80 min-w-[70px]">No. {p.id}</span>
                                    <span className="text-lg md:text-2xl font-bold text-orange-100">{p.name}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const SinglePrizeSlide = ({ id, name }) => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                <div className="watermark-text" style={{ top: '5%', left: '5%', fontSize: '25vw' }}>{id}</div>
                <div className="flex flex-col items-center w-full max-w-7xl relative z-10">
                    <div className="flex items-center gap-8 mb-12">
                        <span className="gift-number text-8xl md:text-[10rem] font-black text-emerald-500 drop-shadow-[0_0_40px_rgba(16,185,129,0.5)]">No. {id}</span>
                        <div className="h-40 w-[2px] bg-gradient-to-b from-transparent via-white/40 to-transparent"></div>
                        <span className="text-4xl md:text-5xl font-bold text-orange-300 tracking-widest uppercase italic opacity-60">Lucky Prize</span>
                    </div>
                    <div className="px-16 py-12 bg-white/5 backdrop-blur-xl rounded-3xl border-2 border-orange-400/30 text-center w-full">
                        <h2 className="text-4xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white via-orange-100 to-orange-200 leading-tight drop-shadow-2xl">{name}</h2>
                    </div>
                </div>
            </div>
        );

        const OutroSlide = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up text-center">
                <div className="flex flex-col items-center transform -translate-y-8 pr-12 overflow-visible">
                    <h2 className="text-7xl md:text-[9rem] font-bold text-white tracking-[0.2em] mb-12 drop-shadow-[0_0_30px_rgba(255,255,255,0.3)] italic whitespace-nowrap">感謝各位蒞臨</h2>
                    <div className="flex flex-col gap-4 mb-20">
                        <p className="text-4xl md:text-7xl font-bold text-orange-100 tracking-widest opacity-90 whitespace-nowrap">2026 冠恆集團春茗</p>
                        <p className="text-4xl md:text-7xl font-bold text-orange-100 tracking-widest opacity-90">圓滿結束</p>
                    </div>
                    <h3 className="text-8xl md:text-[11rem] font-black text-yellow-400 tracking-tighter italic drop-shadow-[0_10px_40px_rgba(250,204,21,0.5)] animate-pulse whitespace-nowrap py-4">下年再見!</h3>
                </div>
            </div>
        );

        const BonusSlide = () => {
            const items = useMemo(() => Array.from({ length: 45 }).map((_, i) => ({ id: i, top: Math.random()*95+'%', left: Math.random()*95+'%', size: Math.random()*5+1.5+'rem', rotate: Math.random()*80-40+'deg', delay: Math.random()*1.5+'s' })), []);
            return (
                <div className="absolute inset-0 z-10 overflow-hidden">
                    {items.map(it => <div key={it.id} className="bonus-item absolute font-black text-transparent bg-clip-text bg-gradient-to-br from-yellow-300 to-red-600 opacity-40" style={{ top: it.top, left: it.left, fontSize: it.size, transform: `rotate(${it.rotate})`, animationDelay: it.delay }}>加碼</div>)}
                    <div className="absolute inset-0 flex items-center justify-center">
                        <div className="px-16 py-12 bg-black/50 backdrop-blur-3xl rounded-3xl border-4 border-orange-500 text-center shadow-[0_0_80px_rgba(249,115,22,0.4)]">
                            <h2 className="text-8xl md:text-[14rem] font-black text-orange-500 italic animate-pulse">加碼!!</h2>
                        </div>
                    </div>
                </div>
            );
        };

        const BackgroundMusic = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const playerRef = useRef(null);
            useEffect(() => {
                window.onYouTubeIframeAPIReady = () => {
                    playerRef.current = new YT.Player('youtube-player', {
                        height: '0', width: '0', videoId: YOUTUBE_VIDEO_ID,
                        playerVars: { autoplay: 1, loop: 1, playlist: YOUTUBE_VIDEO_ID, controls: 0 },
                        events: { onReady: (e) => { e.target.mute(); e.target.playVideo(); } }
                    });
                };
                if (window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
            }, []);
            const toggle = () => {
                if (!playerRef.current) return;
                if (isPlaying) playerRef.current.mute(); else { playerRef.current.unMute(); playerRef.current.setVolume(50); }
                setIsPlaying(!isPlaying);
            };
            return (
                <div className="fixed top-8 right-8 z-50 flex items-center gap-4">
                    <div id="youtube-player" className="hidden"></div>
                    {isPlaying && <div className="flex items-end h-5 mb-1">{[0,0.2,0.4,0.1].map((d,i)=><div key={i} className="music-bar" style={{animationDelay:`${d}s`}}></div>)}</div>}
                    <button onClick={toggle} className="p-4 bg-white/10 hover:bg-emerald-500/30 border border-white/20 rounded-full transition-all backdrop-blur-xl text-white/90 shadow-lg">
                        {isPlaying ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg> : <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>}
                    </button>
                </div>
            );
        };

        // --- 3. 主應用程式 ---

        function App() {
            const [slide, setSlide] = useState(0);
            const [zoom, setZoom] = useState(false);
            const [focusImg, setFocusImg] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const domeItems = useMemo(() => buildItems(INITIAL_IMAGES, 120), []);

            const allSlides = [
                <GallerySlide items={domeItems} radius={FIXED_RADIUS} isZoomed={zoom} setFocusedImage={setFocusImg} setIsZoomed={setZoom} />,
                <SloganSlide />,
                <SpeechSlide name1="Morris" name2="Mikey" />,
                <SpeechSlide name1="Teddy" name2="Kanji" />,
                <AwardTitleSlide />,
                <ServiceYearSlide years="10" names="David Tsang" />,
                <ServiceYearSlide years="15" names="Kanji Kwok" />,
                <ServiceYearSlide years="20" names="Kason Lau, Steven Ngai" />,
                <ServiceYearSlide years="25" names="Wilson Chang" />,
                <GameTimeTitleSlide />,
                <div className="absolute inset-0 flex items-center justify-center z-10 px-6 animate-slide-up"><div className="relative z-10 flex flex-col items-center w-full max-w-6xl transform -translate-y-4"><div className="w-full flex justify-start mb-6"><span className="text-orange-300/90 text-2xl md:text-4xl font-bold tracking-wide ml-8 md:ml-16">唔係講笑...</span></div><div><h2 className="text-6xl md:text-[8.5rem] font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-orange-300 to-orange-400 text-center leading-tight">今晚獎金、獎品<br />非常豐富！！</h2></div></div></div>,
                <div className="absolute inset-0 flex items-center justify-center z-10 px-6 animate-slide-up"><div className="w-full max-w-6xl"><div className="flex flex-col items-center text-center"><div className="flex flex-col items-center mb-8"><span className="text-orange-300/90 text-3xl md:text-5xl font-bold tracking-[0.5em]">玩法</span><span className="text-orange-400/40 text-sm md:text-xl uppercase tracking-widest">How to Play</span></div><p className="text-orange-100/90 text-3xl md:text-5xl font-bold tracking-widest leading-relaxed mb-4">被抽中的枱號，每人皆可獲得</p><span className="text-orange-400/50 text-sm md:text-2xl uppercase tracking-wide px-10">Every guest wins when their table number is drawn!</span><div className="flex flex-col items-center mt-6"><span className="text-8xl md:text-[12rem] font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-pink-300 via-purple-400 to-blue-500 leading-none">豐富獎品</span><span className="text-blue-300/60 text-xl md:text-4xl uppercase mt-2">Fabulous Prizes</span><div className="mt-8 px-12 py-4 bg-white/5 border border-white/10 rounded-lg"><span className="text-2xl md:text-5xl font-bold text-emerald-400">個人護理及小家電</span></div></div></div></div></div>,
                <GallerySlide items={domeItems} radius={FIXED_RADIUS} isZoomed={zoom} setFocusedImage={setFocusImg} setIsZoomed={setZoom} />,
                <CompetitionSlide />,
                <GallerySlide items={domeItems} radius={FIXED_RADIUS} isZoomed={zoom} setFocusedImage={setFocusImg} setIsZoomed={setZoom} />,
                <BingoSlide />,
                <GallerySlide items={domeItems} radius={FIXED_RADIUS} isZoomed={zoom} setFocusedImage={setFocusImg} setIsZoomed={setZoom} />,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up"><h2 className="text-8xl md:text-[14rem] font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 via-orange-400 to-orange-600 leading-tight py-4">抽獎環節</h2><span className="text-orange-200/40 text-4xl md:text-6xl font-light uppercase mt-4 italic">Lucky Draw Session</span><div className="mt-16 px-16 py-6 bg-white/10 rounded-full border border-white/20"><span className="text-3xl md:text-5xl font-bold text-emerald-400">共有 12 個獲獎名額</span></div></div>,
                <PrizeListSlide start={0} end={6} />,
                <PrizeListSlide start={6} end={12} />,
                ...[...PRIZES].reverse().map(p => <SinglePrizeSlide key={`prize-${p.id}`} id={p.id} name={p.name} />),
                <BonusSlide key="b1" />, <BonusSlide key="b2" />,
                <OutroSlide key="end" />
            ];

            useEffect(() => {
                const urls = Array.from(new Set(domeItems.map(it => it.src)));
                let loaded = 0;
                urls.forEach(url => {
                    const img = new Image();
                    img.src = url;
                    img.onload = img.onerror = () => {
                        loaded++;
                        if (document.getElementById('loader-fill')) document.getElementById('loader-fill').style.width = (loaded/urls.length)*100+'%';
                        if (loaded >= urls.length) setTimeout(() => { 
                            const preloader = document.getElementById('preloader');
                            if (preloader) {
                                preloader.style.opacity = '0'; 
                                setTimeout(() => { 
                                    preloader.style.display = 'none'; 
                                    setIsReady(true); 
                                }, 800); 
                            }
                        }, 500);
                    };
                });
            }, [domeItems]);

            if (!isReady) return null;

            return (
                <div className="relative w-full h-screen bg-[#010401] overflow-hidden select-none animate-fade-in">
                    <BackgroundMusic />
                    <div className="absolute inset-0 z-0 scale-125"><div className="aurora-fluid aurora-v1"/><div className="aurora-fluid aurora-v2"/><div className="aurora-fluid aurora-v3"/></div>
                    
                    {allSlides[slide]}

                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-40 flex items-center gap-4">
                        <button onClick={()=>setSlide(p=>Math.max(0,p-1))} className={`p-4 rounded-full border transition-all ${slide>0 ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-400' : 'opacity-20 pointer-events-none'}`}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <div className="flex gap-1 flex-wrap justify-center max-w-[500px]">{allSlides.map((_,i)=><div key={`dot-${i}`} className={`w-1 h-1 rounded-full transition-all ${slide===i ? 'bg-emerald-400 w-3' : 'bg-white/10'}`}/>)}</div>
                        <button onClick={()=>setSlide(p=>Math.min(allSlides.length-1,p+1))} className={`p-4 rounded-full border transition-all ${slide<allSlides.length-1 ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-400' : 'opacity-20 pointer-events-none'}`}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                    </div>
                    
                    {zoom && focusImg && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/98 backdrop-blur-3xl p-4" onClick={()=>setZoom(false)}>
                            <div className="relative max-w-6xl max-h-[85vh] shadow-2xl rounded-2xl border border-white/10 overflow-hidden"><img src={focusImg.src} referrerPolicy="no-referrer" className="block w-full h-full object-contain" /></div>
                            <button className="absolute top-8 right-8 p-4 bg-white/10 text-white rounded-full"><span className="text-xl">✕</span></button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
