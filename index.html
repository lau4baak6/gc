<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Century Holdings Limited - Annual Dinner 2026</title>
    
    <!-- Tailwind CSS 用於樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React 和 Babel 用於瀏覽器端編譯 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #010401;
            overflow: hidden;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 北極光背景特效 */
        .aurora-fluid { 
            position: absolute; 
            width: 140vw; 
            height: 140vh; 
            filter: blur(140px); 
            opacity: 0.6; 
            mix-blend-mode: screen; 
        }
        .aurora-v1 { background: radial-gradient(circle at 20% 20%, #064e3b 0%, transparent 65%); animation: aurora-flow 30s infinite alternate ease-in-out; top: -10%; left: -10%; }
        .aurora-v2 { background: radial-gradient(circle at 80% 80%, #065f46 0%, transparent 65%); animation: aurora-flow 35s infinite alternate-reverse ease-in-out; bottom: -10%; right: -10%; }
        .aurora-v3 { background: radial-gradient(circle at 50% 50%, #0d9488 0%, transparent 55%); animation: aurora-flow 25s infinite alternate ease-in-out; top: 15%; left: 15%; }
        
        @keyframes aurora-flow {
            0% { transform: translate(0,0) scale(1) rotate(0deg); border-radius: 40% 60% 70% 30%; }
            100% { transform: translate(-10%,20%) scale(0.9) rotate(-10deg); border-radius: 30% 70% 50% 50%; }
        }

        /* 動畫效果 */
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* 3D 渲染屬性 */
        .preserve-3d { transform-style: preserve-3d; }

        /* 背景浮水印文字 */
        .watermark-text {
            position: absolute;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            transform: rotate(-15deg);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- 自定義圖標組件 ---
        const IconX = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const IconChevronRight = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        );
        const IconChevronLeft = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        );

        // --- 圖片數據 ---
        const DRIVE_IDS = [
            '1_UDb1eM70zzDceSal-FoVtGG5gKvC2G5',
            '1C3rOoEzaVnu4n43vEirqvUiXJ0ooLmPW',
            '1MkJ9nGP7JuR9ykoZOo5Dt4WD8mhMn9TD',
            '1D3PQIbYFjWSkOlR1mSPpJJYSObEQwPCY'
        ];

        const INITIAL_IMAGES = DRIVE_IDS.map(id => ({
            src: `https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
            alt: 'Dinner Archive'
        }));

        // --- 工具函數：構建 3D 佈局 ---
        const buildItems = (pool, count) => {
            if (!pool || pool.length === 0) return [];
            const items = [];
            const rows = 6; 
            const itemsPerRow = Math.ceil(count / rows);
            const horizontalStep = 360 / itemsPerRow; 
            const verticalStep = 8.5;

            for (let i = 0; i < count; i++) {
                const rowIndex = (i % rows) - (rows - 1) / 2;
                const colIndex = Math.floor(i / rows);
                const pitch = rowIndex * verticalStep;
                const yaw = colIndex * horizontalStep;
                items.push({ yaw, pitch, src: pool[i % pool.length].src, alt: pool[i % pool.length].alt });
            }
            return items;
        };

        // --- 組件：Slide 1 (3D 畫廊) ---
        const GallerySlide = ({ items, radius, isZoomed, setFocusedImage, setIsZoomed }) => {
            const stageRef = useRef(null);
            const rotationRef = useRef({ targetY: 0, currentY: 0 });
            const draggingRef = useRef(false);
            const lastMousePos = useRef({ x: 0 });
            const frameRef = useRef(null);

            const applyTransform = useCallback((y) => {
                if (stageRef.current) {
                    stageRef.current.style.transform = `translateZ(${-radius}px) rotateY(${y}deg)`;
                }
            }, [radius]);

            useEffect(() => {
                const animate = () => {
                    if (!isZoomed) {
                        if (!draggingRef.current) rotationRef.current.targetY += 0.12; 
                        const lerpFactor = 0.07; 
                        rotationRef.current.currentY += (rotationRef.current.targetY - rotationRef.current.currentY) * lerpFactor;
                        applyTransform(rotationRef.current.currentY);
                    }
                    frameRef.current = requestAnimationFrame(animate);
                };
                frameRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frameRef.current);
            }, [isZoomed, applyTransform]);

            const onDown = (e) => {
                if (isZoomed) return;
                draggingRef.current = true;
                lastMousePos.current.x = e.clientX || (e.touches && e.touches[0].clientX);
            };

            const onMove = (e) => {
                if (!draggingRef.current || isZoomed) return;
                const x = e.clientX || (e.touches && e.touches[0].clientX);
                const deltaX = x - lastMousePos.current.x;
                rotationRef.current.targetY += deltaX * 0.12;
                lastMousePos.current.x = x;
            };

            return (
                <div 
                    className="absolute inset-0 flex items-center justify-center [perspective:2000px] z-10 animate-fade-in touch-none"
                    onPointerDown={onDown}
                    onPointerMove={onMove}
                    onPointerUp={() => draggingRef.current = false}
                >
                    <div ref={stageRef} className="relative w-0 h-0 preserve-3d will-change-transform">
                        {items.map((it, i) => (
                            <div 
                                key={i}
                                className="absolute w-[220px] h-[140px] -left-[110px] -top-[70px] preserve-3d"
                                style={{ transform: `rotateY(${it.yaw}deg) rotateX(${-it.pitch}deg) translateZ(${radius}px)` }}
                            >
                                <div 
                                    className="group relative w-full h-full cursor-pointer p-[1px] rounded-lg transition-all duration-700 hover:scale-115 active:scale-95"
                                    onClick={() => { setFocusedImage(it); setIsZoomed(true); }}
                                >
                                    <div className="absolute inset-0 rounded-lg bg-gradient-to-br from-white/20 to-transparent opacity-30 border border-white/10 backdrop-blur-[1px]" />
                                    <div className="relative w-full h-full overflow-hidden rounded-md bg-black/50 backdrop-blur-md">
                                        <img src={it.src} alt={it.alt} referrerPolicy="no-referrer" className="w-full h-full object-cover opacity-50 transition-all duration-1000 group-hover:opacity-100 group-hover:scale-110 grayscale-[40%]" loading="lazy" />
                                        <div className="absolute inset-0 shadow-[inset_0_0_30px_rgba(0,0,0,0.5)]" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 組件：Slide 2 (公告/對聯) ---
        const SloganSlide = () => {
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                    <div className="flex flex-col items-center mb-12 opacity-90">
                        <div className="flex items-center gap-4 mb-2">
                            <div className="w-12 h-12 border-2 border-emerald-400 flex items-center justify-center font-black text-emerald-400 text-2xl tracking-tighter">
                                GC
                            </div>
                            <h2 className="text-white text-4xl font-bold tracking-tight">冠恒集團</h2>
                        </div>
                        <p className="text-white/60 text-[11px] tracking-[0.3em] uppercase font-medium">Good Century Holdings Limited</p>
                    </div>

                    <div className="relative flex flex-col items-center mb-16 md:mb-24">
                        <h1 className="text-5xl md:text-8xl font-light tracking-[0.15em] text-transparent bg-clip-text bg-gradient-to-r from-yellow-100 via-orange-300 to-yellow-200 text-center leading-tight">
                            ANNUAL DINNER
                        </h1>
                        <div className="w-full flex items-center gap-6 mt-4">
                           <span className="text-orange-300/80 text-lg tracking-[0.5em] font-medium">2 0 2 6</span>
                           <div className="h-[1px] flex-1 bg-gradient-to-r from-orange-300/50 to-transparent" />
                        </div>
                    </div>

                    <div className="flex flex-col gap-10 md:gap-14 items-center">
                        <div className="flex gap-4 md:gap-20">
                            {"冠世風華".split('').map((char, i) => (
                                <span key={i} className="text-4xl md:text-7xl font-bold text-orange-200/95 tracking-widest drop-shadow-lg">{char}</span>
                            ))}
                            <div className="flex items-end pb-2">
                                <span className="text-2xl md:text-5xl text-orange-200/80 font-bold tracking-tighter ml-3 md:ml-6 whitespace-nowrap">廿二載</span>
                            </div>
                        </div>
                        
                        <div className="flex gap-4 md:gap-20">
                            {"恆守初心".split('').map((char, i) => (
                                <span key={i} className="text-4xl md:text-7xl font-bold text-orange-200/95 tracking-widest drop-shadow-lg">{char}</span>
                            ))}
                            <div className="flex items-end pb-2">
                                <span className="text-2xl md:text-5xl text-orange-200/80 font-bold tracking-tighter ml-3 md:ml-6 whitespace-nowrap">志未改</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 組件：Slide 3 (獎金獎品) ---
        const PrizeSlide = () => {
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                    {/* 背景浮水印 */}
                    <div className="watermark-text" style={{ top: '10%', left: '-10%' }}>$200,000</div>
                    <div className="watermark-text" style={{ bottom: '5%', right: '-5%', transform: 'rotate(-15deg) scale(0.8)' }}>$200,000</div>

                    <div className="relative z-10 flex flex-col items-center w-full max-w-5xl">
                        {/* 左上小字 */}
                        <div className="w-full flex justify-start mb-4 md:mb-0">
                            <span className="text-orange-300/90 text-xl md:text-3xl font-bold tracking-wide ml-4 md:ml-12 drop-shadow-md">
                                唔係講笑...
                            </span>
                        </div>

                        {/* 主體文字 */}
                        <div className="mb-10 md:mb-16">
                            <h2 className="text-5xl md:text-[7rem] font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-orange-300 to-orange-400 drop-shadow-2xl text-center leading-tight">
                                今晚獎金、獎品非常豐富
                            </h2>
                        </div>

                        {/* 底部總值 */}
                        <div className="flex items-center gap-4 md:gap-6 bg-black/20 backdrop-blur-sm px-8 py-3 rounded-full border border-orange-300/20">
                            <div className="w-4 h-4 md:w-6 md:h-6 bg-orange-400 rounded-full shadow-[0_0_15px_rgba(251,146,60,0.8)]" />
                            <span className="text-2xl md:text-4xl font-bold text-orange-300/90 tracking-widest uppercase">
                                總值超過 HKD $200,000
                            </span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主程式進入點 ---
        function App() {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [isZoomed, setIsZoomed] = useState(false);
            const [focusedImage, setFocusedImage] = useState(null);
            const [radius, setRadius] = useState(1150);
            
            const containerRef = useRef(null);
            const totalItems = 180; 
            const items = useMemo(() => buildItems(INITIAL_IMAGES, totalItems), []);

            useEffect(() => {
                const updateLayout = () => {
                    if (containerRef.current) {
                        setRadius(Math.max(1050, containerRef.current.clientWidth * 0.95));
                    }
                };
                updateLayout();
                window.addEventListener('resize', updateLayout);
                return () => window.removeEventListener('resize', updateLayout);
            }, []);

            return (
                <div ref={containerRef} className="relative w-full h-screen bg-[#010401] overflow-hidden font-sans select-none touch-none">
                    {/* 背景流動極光層 */}
                    <div className="absolute inset-0 z-0 pointer-events-none overflow-hidden scale-125">
                        <div className="aurora-fluid aurora-v1" />
                        <div className="aurora-fluid aurora-v2" />
                        <div className="aurora-fluid aurora-v3" />
                    </div>

                    {/* 切換頁面內容 */}
                    {currentSlide === 0 && (
                        <GallerySlide 
                            items={items} 
                            radius={radius} 
                            isZoomed={isZoomed} 
                            setFocusedImage={setFocusedImage} 
                            setIsZoomed={setIsZoomed} 
                        />
                    )}
                    {currentSlide === 1 && <SloganSlide />}
                    {currentSlide === 2 && <PrizeSlide />}

                    {/* 導航控制按鈕 */}
                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-40 flex items-center gap-6 md:gap-10">
                        <button 
                            onClick={() => setCurrentSlide(prev => Math.max(0, prev - 1))}
                            className={`p-4 md:p-5 rounded-full border transition-all duration-500 backdrop-blur-md ${currentSlide > 0 ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-400 scale-110 shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'border-white/5 text-white/10 opacity-30 cursor-not-allowed'}`}
                        >
                            <IconChevronLeft size={28} />
                        </button>
                        
                        <div className="flex gap-3">
                            {[0, 1, 2].map(idx => (
                                <div 
                                    key={idx}
                                    className={`w-3 h-3 rounded-full transition-all duration-500 ${currentSlide === idx ? 'bg-emerald-400 w-8' : 'bg-white/20'}`}
                                />
                            ))}
                        </div>

                        <button 
                            onClick={() => setCurrentSlide(prev => Math.min(2, prev + 1))}
                            className={`p-4 md:p-5 rounded-full border transition-all duration-500 backdrop-blur-md ${currentSlide < 2 ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-400 scale-110 shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'border-white/5 text-white/10 opacity-30 cursor-not-allowed'}`}
                        >
                            <IconChevronRight size={28} />
                        </button>
                    </div>

                    {/* 圖片放大檢視層 */}
                    {isZoomed && focusedImage && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-3xl animate-fade-in p-4">
                            <div className="relative max-w-6xl max-h-[85vh] shadow-2xl rounded-2xl border border-white/10 overflow-hidden bg-black/40">
                                <img src={focusedImage.src} alt={focusedImage.alt} referrerPolicy="no-referrer" className="block w-full h-full object-contain" />
                                <button onClick={() => setIsZoomed(false)} className="absolute top-4 right-4 md:top-6 md:right-6 p-2 md:p-3 bg-white/10 text-white rounded-full hover:bg-emerald-500 transition-all backdrop-blur-xl border border-white/20 z-50">
                                    <IconX />
                                </button>
                            </div>
                            <div className="absolute inset-0 -z-10 cursor-zoom-out" onClick={() => setIsZoomed(false)} />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
