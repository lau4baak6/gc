<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Century Annual Dinner 2025</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010401;
            overflow: hidden;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: manipulation;
        }

        #preloader {
            position: fixed; inset: 0;
            background-color: #010401;
            z-index: 10000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1s ease-in-out;
        }
        .loader-bar-bg {
            width: 240px; height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 24px; position: relative;
            overflow: hidden; border-radius: 2px;
        }
        .loader-bar-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            background: #10b981; width: 0%;
            transition: width 0.3s ease;
        }

        .aurora-fluid { 
            position: absolute; 
            width: 140vw; height: 140vh; 
            filter: blur(100px); opacity: 0.5; 
            mix-blend-mode: screen; will-change: transform;
            z-index: 0;
        }
        .aurora-v1 { background: radial-gradient(circle at 20% 20%, #064e3b 0%, transparent 65%); animation: aurora-flow 30s infinite alternate ease-in-out; top: -10%; left: -10%; }
        .aurora-v2 { background: radial-gradient(circle at 80% 80%, #065f46 0%, transparent 65%); animation: aurora-flow 35s infinite alternate-reverse ease-in-out; bottom: -10%; right: -10%; }
        .aurora-v3 { background: radial-gradient(circle at 50% 50%, #0d9488 0%, transparent 55%); animation: aurora-flow 25s infinite alternate ease-in-out; top: 15%; left: 15%; }
        
        .aurora-orange { background: radial-gradient(circle at 50% 50%, #ea580c 0%, transparent 65%); animation: aurora-flow 15s infinite alternate ease-in-out; }

        @keyframes aurora-flow {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(-5%,10%) rotate(-5deg); }
        }

        .text-white-gold {
            background: linear-gradient(to bottom, #ffffff 0%, #fef3c7 45%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
        }

        .gold-shiny-tag {
            background: linear-gradient(110deg, #d97706 0%, #fbbf24 45%, #fef3c7 50%, #fbbf24 55%, #d97706 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }

        .text-exaggerated-purple {
            background: linear-gradient(to bottom, #f0abfc, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.6));
        }

        .text-emerald-glow {
            background: linear-gradient(to bottom, #ffffff, #6ee7b7, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(16, 185, 129, 0.6));
        }

        .preserve-3d { transform-style: preserve-3d; }

        @keyframes zoomInEffect {
          0% { transform: scale(0.1) translateZ(-500px); opacity: 0; }
          100% { transform: scale(1) translateZ(0); opacity: 1; }
        }
        .zoom-in-container { animation: zoomInEffect 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .music-bar {
            width: 3px; background: #fbbf24; margin: 0 1px;
            animation: music-bounce 1s ease-in-out infinite;
        }
        @keyframes music-bounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        
        .photo-grid-item {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s;
        }
        .photo-grid-item:hover {
            filter: brightness(1.2);
            z-index: 100;
        }

        .gift-watermark {
            position: absolute;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
        }
    </style>
</head>

            "1PmqdV_qmFX-LeRib9MNB9R8INoJGKgU7", "1bzH-ME_wtV8f2SVBC8zW7OBOoJvdCIe2", "1kc-P0V3RldSNXSTmaBdyAxGCc_-ubR8J",

        const PRIZES = [
            { id: 1, name: "TCL 65\" TV" }, { id: 2, name: "SAMSUNG TV 55\"" }, { id: 3, name: "SAMSUNG TV 55\"" },
            { id: 4, name: "Apple Mac mini" }, { id: 5, name: "MYTREX MIRAY ONE美容儀" }, { id: 6, name: "ASUS ROG XBOX ALLY" },
            { id: 7, name: "B&O A1 3rd Gen" }, { id: 8, name: "TP Link Tri-Band Wi-Fi 7 Router" }, { id: 9, name: "TP Link Wi-Fi 7 電競路由器" },

        function buildDomeStructure(pool) {
            const items = [];
            const rows = 5; 
            const itemsPerRow = Math.ceil(pool.length / rows);
            const horizontalStep = 360 / itemsPerRow;
            const verticalStep = 15; 
            pool.forEach((data, i) => {
                const rowIndex = (i % rows) - (rows - 1) / 2;
                const colIndex = Math.floor(i / rows);
                items.push({ yaw: colIndex * horizontalStep, pitch: rowIndex * verticalStep, ...data });
            });
            return items;
        }

        // --- 2. 組件定義 ---

        function GallerySlide({ items, isZoomed, setIsZoomed, setFocusedImage, focusedImage }) {
            const stageRef = useRef(null);
            const rotationRef = useRef(0);
            const [radius, setRadius] = useState(1100);

            useEffect(() => {
                const handleResize = () => setRadius(window.innerWidth < 768 ? 700 : 1100);
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (isZoomed) {
                    const timer = setTimeout(() => setIsZoomed(false), 6000);
                    return () => clearTimeout(timer);
                } else {
                    const cycleTimer = setTimeout(() => {
                        const randomImg = items[Math.floor(Math.random() * items.length)];
                        setFocusedImage(randomImg);
                        setIsZoomed(true);
                    }, 5000);
                    return () => clearTimeout(cycleTimer);
                }
            }, [isZoomed, items]);

            // 修正：使用恆定速度，不隨時間或渲染累計加速
            useEffect(() => {
                let rafId;
                const animate = () => {
                    if (!isZoomed && stageRef.current) {
                        rotationRef.current += 0.1; // 保持每幀固定的增加值
                        stageRef.current.style.transform = `translate3d(0, 0, ${-radius}px) rotateY(${rotationRef.current}deg)`;
                    }
                    rafId = requestAnimationFrame(animate);
                };
                rafId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(rafId);
            }, [isZoomed, radius]);

            return (
                <div className="absolute inset-0 flex items-center justify-center [perspective:1200px] z-10 transition-all duration-1000"
                    style={{ transform: isZoomed ? 'scale(0.85) translateZ(-150px)' : 'scale(1)', opacity: isZoomed ? 0.2 : 1 }}>
                    <div ref={stageRef} className="relative w-0 h-0 [transform-style:preserve-3d]">
                        {items.map((it, i) => (
                            <div key={i} className="absolute w-[210px] h-[135px] md:w-[320px] md:h-[200px] -left-[105px] md:-left-[160px] -top-[67px] md:-top-[100px] [transform-style:preserve-3d]"
                                style={{ transform: `rotateY(${it.yaw}deg) rotateX(${-it.pitch}deg) translateZ(${radius}px)` }}>
                                <div 
                                    className="photo-grid-item w-full h-full bg-white/5 rounded-2xl border border-white/20 overflow-hidden shadow-2xl cursor-pointer"
                                    onClick={(e) => { e.stopPropagation(); setFocusedImage(it); setIsZoomed(true); }}
                                >
                                    <img src={it.src} className="w-full h-full object-cover opacity-70 hover:opacity-100 transition-opacity" loading="lazy" />
                                </div>
                            </div>
                        ))}

                </div>
            );
        }

        function SloganSlide() {
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-4 text-center">

                            <span className="text-[8.5vw] md:text-[5.5rem] font-black text-white-gold tracking-[0.1em] drop-shadow-2xl whitespace-nowrap">恆守初心志未改</span>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [slide, setSlide] = useState(0);
            const [isReady, setIsReady] = useState(false);
            const [isZoomed, setIsZoomed] = useState(false);
            const [focusedImage, setFocusedImage] = useState(null);
            
            const audioWelcome = useRef(new Audio(BGM_WELCOME));
            const audioBoss = useRef(new Audio(BGM_BOSS));
            const audioMissHK = useRef(new Audio(BGM_MISS_HK));

            const currentBgmRef = useRef(null);
            const domeItems = useMemo(() => buildDomeStructure(PHOTO_ITEMS), []);

            // 優化的音樂控制邏輯
            useEffect(() => {
                if (!isReady) return;

                let nextBgm = null;
                if (slide === 0 || slide === 1) nextBgm = audioWelcome.current;
                else if (slide === 2) nextBgm = audioBoss.current;
                else if (slide >= 3 && slide <= 7) nextBgm = audioMissHK.current;

                if (currentBgmRef.current !== nextBgm) {
                    if (currentBgmRef.current) {
                        currentBgmRef.current.pause();
                        currentBgmRef.current.currentTime = 0;
                    }
                    if (nextBgm) {
                        nextBgm.loop = true;
                        nextBgm.play().catch(()=>{});
                    }
                    currentBgmRef.current = nextBgm;
                }
            }, [slide, isReady]);

            const allSlides = [

                            </div>

                        </div>

                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up"><span className="text-white-gold text-6xl md:text-[10rem] font-black tracking-widest drop-shadow-lg mb-12 opacity-90">25 Years</span><span className="text-5xl md:text-9xl font-medium text-white drop-shadow-2xl">Wilson Chang</span></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 animate-slide-up text-center"><h2 className="text-[15vw] md:text-[15rem] font-black italic tracking-tighter text-emerald-glow pr-8 md:pr-16 py-8 overflow-visible leading-none">GAME TIME!</h2></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 animate-slide-up text-center transform -translate-y-8"><div className="w-full flex justify-start mb-6 max-w-6xl md:max-w-7xl"><span className="text-yellow-500 text-2xl md:text-4xl font-bold ml-4 md:ml-20">唔係講笑...</span></div><h2 className="text-6xl md:text-[10rem] font-bold tracking-wider text-white leading-tight">今晚獎金、獎品<br />非常豐富！！</h2></div>,

                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} focusedImage={focusedImage} />,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-4 md:px-6">
                    <div className="w-full max-w-7xl transform -translate-y-4 md:-translate-y-8">
                        <div className="w-full flex justify-between items-end mb-6 md:mb-12 border-b border-white/10 pb-4">
                            <span className="text-emerald-400 text-2xl md:text-6xl font-bold tracking-wide">Game 2</span>
                            <span className="text-white text-4xl md:text-8xl font-bold uppercase">競飲</span>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 items-stretch">
                            {['g1','g2','g3'].map((id, idx) => {
                                const groupData = { g1: "2, 5, 8, 11, 15, 18", g2: "1, 6, 9, 12, 16, 19", g3: "3, 7, 10, 13, 17" };
                                const [rev, setRev] = useState(false);
                                return (
                                    <div key={id} className="flex flex-col h-full">
                                        <div onClick={() => setRev(true)} className={`flex-grow bg-white/5 border border-white/10 p-8 rounded-xl cursor-pointer transition-all duration-1000 ${rev ? 'blur-0 bg-white/10 shadow-[0_0_30px_rgba(16,185,129,0.2)]' : 'blur-2xl'}`}>
                                            <span className="block text-yellow-500 font-bold mb-3 text-lg md:text-2xl uppercase">Group {idx+1}</span>
                                            <p className="text-white text-2xl md:text-4xl font-black">{groupData[id]}</p>
                                        </div>
                                        <div className="mt-4 text-emerald-500 animate-bounce flex justify-center text-3xl">↓</div>
                                        <div className="w-full bg-white/5 border border-white/20 py-4 rounded-lg text-center mt-2 shadow-lg"><span className="text-xl font-black text-white uppercase opacity-80">晉級</span></div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex justify-center mt-8">
                            <div className="px-10 py-5 md:px-32 md:py-10 bg-gradient-to-r from-emerald-600/40 via-emerald-400/40 to-emerald-600/40 border-2 border-emerald-400/60 rounded-2xl shadow-[0_0_80px_rgba(16,185,129,0.3)] text-center"><span className="text-3xl md:text-8xl font-bold text-white tracking-widest drop-shadow-2xl">冠・亞・季</span></div>
                        </div>
                    </div>
                </div>,
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} focusedImage={focusedImage} />,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 animate-slide-up">
                    <div className="w-full max-w-6xl transform -translate-y-8">
                        <div className="flex justify-between items-end mb-10 border-b border-white/10 pb-4">
                            <span className="text-emerald-400 text-2xl md:text-5xl font-bold uppercase tracking-widest">Game 3</span>
                            <div className="flex flex-col items-end"><span className="text-white text-5xl md:text-8xl font-black drop-shadow-2xl">Bingo!</span><span className="text-white/40 text-xl md:text-2xl uppercase tracking-[0.2em]">Bingo Challenge</span></div>
                        </div>
                        <div className="space-y-6 md:space-y-12 pl-6 border-l-4 border-emerald-500/50">
                            <div className="flex items-center gap-6"><div className="w-10 h-10 md:w-14 md:h-14 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-xl">1</div><p className="text-xl md:text-5xl font-bold text-white leading-tight">每人手上已有一張「六合彩飛」</p></div>
                            <div className="flex items-center gap-6"><div className="w-10 h-10 md:w-14 md:h-14 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-xl">2</div><p className="text-xl md:text-5xl font-bold text-white leading-tight">會從 1 - 49 號中抽數字</p></div>
                            <div className="flex items-center gap-6"><div className="w-10 h-10 md:w-14 md:h-14 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-xl">3</div><p className="text-xl md:text-5xl font-bold text-white leading-tight">最快湊成 <span className='text-emerald-400 font-black'>4</span> 組號碼</p></div>
                            <div className="p-4 md:p-10 bg-red-600/20 border-2 border-red-500/30 rounded-2xl mt-10 shadow-2xl"><p className="text-lg md:text-4xl font-black text-red-500 tracking-wider">名額只有五個，記得盡快舉手行出嚟喇！</p></div>
                        </div>
                    </div>
                </div>,
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} focusedImage={focusedImage} />,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up"><h2 className="text-8xl md:text-[15rem] font-black text-white-gold leading-none py-8">抽獎環節</h2><span className="text-white/60 text-4xl md:text-7xl font-light uppercase mt-6 italic">Lucky Draw Session</span><div className="mt-16 px-16 py-8 bg-white/10 rounded-full border border-white/20 shadow-2xl"><span className="text-3xl md:text-6xl font-bold text-emerald-400">共有 12 個獲獎名額</span></div></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-4 md:px-6"><div className="w-full max-w-5xl space-y-3">{[...PRIZES].reverse().slice(0,6).map(p => <div key={p.id} className="flex items-center gap-8 bg-white/5 p-4 rounded-2xl border border-white/10"><span className="text-emerald-400 font-black text-3xl md:text-5xl min-w-[60px] md:min-w-[120px]">No. {p.id}</span><span className="text-2xl md:text-5xl font-bold text-white opacity-90">{p.name}</span></div>)}</div></div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-4 md:px-6"><div className="w-full max-w-5xl space-y-3">{[...PRIZES].reverse().slice(6,12).map(p => <div key={p.id} className="flex items-center gap-8 bg-white/5 p-4 rounded-2xl border border-white/10"><span className="text-emerald-400 font-black text-3xl md:text-5xl min-w-[60px] md:min-w-[120px]">No. {p.id}</span><span className="text-2xl md:text-5xl font-bold text-white opacity-90">{p.name}</span></div>)}</div></div>,
                ...[...PRIZES].reverse().map(p => (
                  <div key={`draw-${p.id}`} className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 animate-slide-up">
                    <div className="gift-watermark">{p.id}</div>
                    <div className="flex items-center gap-6 md:gap-10 mb-8 relative z-10">
                        <span className="text-5xl md:text-[10rem] font-black text-emerald-400 drop-shadow-2xl">No. {p.id}</span>
                        <div className="h-16 md:h-40 w-[2px] bg-white/20"/><span className="text-2xl md:text-6xl font-bold text-white opacity-40 italic">Lucky Draw</span>
                    </div>
                    <div className="relative z-10 px-8 py-10 md:px-14 md:py-16 bg-white/5 backdrop-blur-3xl rounded-[30px] border-2 border-white/20 text-center w-full max-w-6xl shadow-2xl">
                        <h2 className="text-3xl md:text-8xl lg:text-9xl font-black text-white drop-shadow-2xl leading-tight">{p.name}</h2>
                    </div>
                  </div>
                )),
                <div className="absolute inset-0 z-20 overflow-hidden bg-orange-900/10">
                    <div className="absolute inset-0 aurora-orange opacity-30 blur-3xl z-0" />
                    <div className="absolute inset-0 flex items-center justify-center">
                        <div className="px-12 py-10 md:px-24 md:py-14 bg-black/60 backdrop-blur-3xl rounded-[40px] border-4 border-orange-500 text-center shadow-[0_0_100px_rgba(249,88,12,0.8)] transform scale-95 md:scale-110"><h2 className="text-7xl md:text-[14rem] font-black text-orange-500 italic animate-pulse whitespace-nowrap">加碼！！</h2></div>
                    </div>
                </div>,
                <div className="absolute inset-0 z-20 overflow-hidden bg-orange-900/10">
                    <div className="absolute inset-0 aurora-orange opacity-30 blur-3xl z-0" />
                    <div className="absolute inset-0 flex items-center justify-center">
                        <div className="px-12 py-10 md:px-24 md:py-14 bg-black/60 backdrop-blur-3xl rounded-[40px] border-4 border-orange-500 text-center shadow-[0_0_100px_rgba(249,88,12,0.8)] transform scale-95 md:scale-110"><h2 className="text-7xl md:text-[14rem] font-black text-orange-500 italic animate-pulse whitespace-nowrap">再加碼！！</h2></div>
                    </div>
                </div>,
                <div className="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 text-center animate-slide-up">
                    <div className="flex flex-col items-center">
                        <h2 className="text-5xl md:text-[10rem] font-bold text-white tracking-widest mb-10 italic drop-shadow-2xl">感謝各位蒞臨</h2>
                        <div className="flex flex-col gap-2 mb-12">
                            <p className="text-3xl md:text-[6rem] font-bold text-white/90 whitespace-nowrap tracking-wider">2026 冠恆集團春茗</p>
                            <p className="text-3xl md:text-[6rem] font-bold text-white/90 whitespace-nowrap tracking-wider">圓滿結束</p>
                        </div>
                        <h3 className="text-7xl md:text-[11rem] font-black text-yellow-400 italic animate-pulse drop-shadow-[0_0_70px_rgba(251,191,36,0.8)] whitespace-nowrap">下年再見!</h3>
                    </div>
                </div>
            ];

            useEffect(() => {
                let loaded = 0;
                const urls = Array.from(new Set(domeItems.map(it => it.src)));
                const forceStart = setTimeout(() => { if (!isReady) finishLoading(); }, 15000);
                const checkFinish = () => {
                    loaded++;
                    const totalResources = urls.length + 3;
                    const fill = document.getElementById('loader-fill');
                    if (fill) fill.style.width = Math.min((loaded/totalResources)*100, 100) + '%';
                    if (loaded >= totalResources) finishLoading();
                };
                const finishLoading = () => {
                    const pre = document.getElementById('preloader');
                    if (pre) pre.style.opacity = '0';
                    setTimeout(() => { if (pre) pre.style.display = 'none'; setIsReady(true); }, 1000);
                };
                urls.forEach(url => { const img = new Image(); img.src = url; img.onload = checkFinish; img.onerror = checkFinish; });
                [audioWelcome, audioBoss, audioMissHK].forEach(a => { a.current.oncanplaythrough = checkFinish; a.current.onerror = checkFinish; a.current.load(); });
                return () => clearTimeout(forceStart);
            }, [domeItems]);

            if (!isReady) return null;

            return (
                <div className="relative w-full h-screen bg-[#010401] overflow-hidden select-none animate-fade-in">
                    <div className="absolute inset-0 z-0 pointer-events-none opacity-100"><div className="aurora-fluid aurora-v1"/><div className="aurora-fluid aurora-v2"/><div className="aurora-fluid aurora-v3"/></div>
                    {allSlides[slide]}
                    <div className="fixed bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 z-50 flex items-center gap-4">
                        <button onClick={()=>setSlide(p=>Math.max(0,p-1))} className="p-4 bg-white/5 md:bg-white/10 rounded-full border border-white/20 active:bg-emerald-500/40 transition-all shadow-lg"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <div className="flex gap-1.5 flex-wrap justify-center max-w-[200px] md:max-w-[800px]">{allSlides.map((_,i)=><div key={i} className={`w-1 h-1 md:w-1.5 md:h-1.5 rounded-full transition-all ${slide===i ? 'bg-yellow-400 w-3 md:w-6' : 'bg-white/10'}`}/>)}</div>
                        <button onClick={()=>setSlide(p=>Math.min(allSlides.length-1,p+1))} className="p-4 bg-white/5 md:bg-white/10 rounded-full border border-white/20 active:bg-emerald-500/40 transition-all shadow-lg"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                    </div>
                    {isZoomed && focusedImage && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/98 backdrop-blur-3xl p-4" onClick={() => setIsZoomed(false)}>
                            <div className={`relative max-w-[95vw] max-h-[85vh] md:max-w-6xl md:max-h-[85vh] shadow-2xl rounded-[24px] md:rounded-[32px] border border-white/10 overflow-hidden zoom-in-container`}><img src={focusedImage.src} className="block w-full h-full object-contain" /><div className="absolute top-4 right-4 p-2 bg-black/40 text-white rounded-full">✕</div></div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
