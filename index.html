<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Century Holdings Limited - Annual Dinner 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <!-- Google Fonts: 行草書法字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010401;
            overflow: hidden;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 行草字體 */
        .calligraphy-font {
            font-family: 'Zhi Mang Xing', cursive;
        }

        /* 極光背景 */
        .aurora-fluid { 
            position: absolute; 
            width: 140vw; height: 140vh; 
            filter: blur(100px); 
            opacity: 0.5; 
            mix-blend-mode: screen; 
            will-change: transform;
        }
        .aurora-v1 { background: radial-gradient(circle at 20% 20%, #064e3b 0%, transparent 65%); animation: aurora-flow 30s infinite alternate ease-in-out; top: -10%; left: -10%; }
        .aurora-v2 { background: radial-gradient(circle at 80% 80%, #065f46 0%, transparent 65%); animation: aurora-flow 35s infinite alternate-reverse ease-in-out; bottom: -10%; right: -10%; }
        .aurora-v3 { background: radial-gradient(circle at 50% 50%, #0d9488 0%, transparent 55%); animation: aurora-flow 25s infinite alternate ease-in-out; top: 15%; left: 15%; }
        
        @keyframes aurora-flow {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(-5%,10%) rotate(-5deg); }
        }

        /* 基礎動畫定義 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 第一階段動畫：Logo & Title */
        .anim-phase-1 {
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 第二階段動畫：Slogan (延遲進場) */
        .anim-phase-2 {
            opacity: 0;
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        /* 通用進場動畫 (Slide 3, 4 用) */
        .animate-slide-up { 
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        .preserve-3d { transform-style: preserve-3d; }

        .watermark-text {
            position: absolute;
            font-size: 15vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            transform: rotate(-15deg);
        }

        .music-bar {
            width: 3px; background: #10b981; margin: 0 1px;
            animation: music-bounce 1s ease-in-out infinite;
        }
        @keyframes music-bounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const IconX = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const IconChevronRight = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        );
        const IconChevronLeft = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        );
        const IconMusic = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        );
        const IconMusicOff = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        );

        const YOUTUBE_VIDEO_ID = 'jfKfPfyJRdk'; 
        const FIXED_RADIUS = 1100; 

        const DRIVE_IDS = [
            '1_UDb1eM70zzDceSal-FoVtGG5gKvC2G5',
            '1C3rOoEzaVnu4n43vEirqvUiXJ0ooLmPW',
            '1MkJ9nGP7JuR9ykoZOo5Dt4WD8mhMn9TD',
            '1D3PQIbYFjWSkOlR1mSPpJJYSObEQwPCY'
        ];

        const INITIAL_IMAGES = DRIVE_IDS.map(id => ({
            src: `https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
            alt: 'Dinner Archive'
        }));

        const buildItems = (pool, count) => {
            const items = [];
            const rows = 6; 
            const itemsPerRow = Math.ceil(count / rows);
            const horizontalStep = 360 / itemsPerRow; 
            const verticalStep = 11; 
            for (let i = 0; i < count; i++) {
                const rowIndex = (i % rows) - (rows - 1) / 2;
                const colIndex = Math.floor(i / rows);
                const pitch = rowIndex * verticalStep;
                const yaw = colIndex * horizontalStep;
                items.push({ yaw, pitch, src: pool[i % pool.length].src, alt: pool[i % pool.length].alt });
            }
            return items;
        };

        // --- Slide 1: 3D Dome ---
        const GallerySlide = ({ items, radius, isZoomed, setFocusedImage, setIsZoomed }) => {
            const stageRef = useRef(null);
            const rotationRef = useRef({ targetY: 0, currentY: 0 });
            const draggingRef = useRef(false);
            const lastMousePos = useRef({ x: 0 });

            const applyTransform = useCallback((y) => {
                if (stageRef.current) {
                    stageRef.current.style.transform = `translate3d(0, 0, ${-radius}px) rotateY(${y}deg)`;
                }
            }, [radius]);

            useEffect(() => {
                const animate = () => {
                    if (!isZoomed) {
                        if (!draggingRef.current) rotationRef.current.targetY += 0.15; 
                        const lerpFactor = 0.08; 
                        rotationRef.current.currentY += (rotationRef.current.targetY - rotationRef.current.currentY) * lerpFactor;
                        applyTransform(rotationRef.current.currentY);
                    }
                    requestAnimationFrame(animate);
                };
                const raf = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(raf);
            }, [isZoomed, applyTransform]);

            return (
                <div 
                    className="absolute inset-0 flex items-center justify-center [perspective:1800px] z-10 touch-none"
                    onPointerDown={(e) => { draggingRef.current = true; lastMousePos.current.x = e.clientX; }}
                    onPointerMove={(e) => {
                        if (!draggingRef.current) return;
                        const deltaX = e.clientX - lastMousePos.current.x;
                        rotationRef.current.targetY += deltaX * 0.15;
                        lastMousePos.current.x = e.clientX;
                    }}
                    onPointerUp={() => draggingRef.current = false}
                >
                    <div ref={stageRef} className="relative w-0 h-0 preserve-3d will-change-transform">
                        {items.map((it, i) => (
                            <div 
                                key={i}
                                className="absolute w-[220px] h-[140px] -left-[110px] -top-[70px] preserve-3d"
                                style={{ transform: `rotateY(${it.yaw}deg) rotateX(${-it.pitch}deg) translateZ(${radius}px)` }}
                            >
                                <div 
                                    className="group relative w-full h-full cursor-pointer p-[1px] rounded-lg transition-transform duration-500 hover:scale-110 active:scale-95"
                                    onClick={() => { setFocusedImage(it); setIsZoomed(true); }}
                                >
                                    <div className="absolute inset-0 rounded-lg bg-white/10 border border-white/10" />
                                    <div className="relative w-full h-full overflow-hidden rounded-md bg-black/40">
                                        <img src={it.src} alt={it.alt} referrerPolicy="no-referrer" className="w-full h-full object-cover opacity-60 transition-opacity duration-700 group-hover:opacity-100 group-hover:scale-105" loading="lazy" />
                                        <div className="absolute inset-0 shadow-[inset_0_0_25px_rgba(0,0,0,0.4)]" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Slide 2: Slogan (分段動畫版) ---
        const SloganSlide = () => {
            const line1 = "冠世風華廿二載".split('');
            const line2 = "恆守初心志未改".split('');
            
            const renderLine = (chars) => (
                <div className="flex justify-center items-center whitespace-nowrap calligraphy-font leading-none py-2">
                    {chars.map((char, i) => (
                        <span key={i} className="text-5xl md:text-[9rem] font-normal text-orange-200/95 tracking-[0.05em] drop-shadow-2xl mx-[0.05em]">
                            {char}
                        </span>
                    ))}
                </div>
            );

            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6">
                    <div className="flex flex-col items-center w-full transform -translate-y-12">
                        
                        {/* 第一階段動畫：Logo & Title */}
                        <div className="anim-phase-1 flex flex-col items-center w-full">
                            <div className="flex flex-col items-center mb-8 opacity-90">
                                <div className="flex items-center gap-4 mb-2">
                                    <div className="w-10 h-10 border-2 border-emerald-400 flex items-center justify-center font-black text-emerald-400 text-xl tracking-tighter">GC</div>
                                    <h2 className="text-white text-3xl font-bold tracking-tight">冠恒集團</h2>
                                </div>
                                <p className="text-white/60 text-[10px] tracking-[0.3em] uppercase font-medium">Good Century Holdings Limited</p>
                            </div>
                            <div className="relative flex flex-col items-center mb-12">
                                <h1 className="text-5xl md:text-8xl font-light tracking-[0.15em] text-transparent bg-clip-text bg-gradient-to-r from-yellow-100 via-orange-300 to-yellow-200 text-center leading-tight">ANNUAL DINNER</h1>
                                <div className="w-full flex items-center gap-6 mt-4">
                                   <span className="text-orange-300/80 text-lg tracking-[0.5em] font-medium">2 0 2 6</span>
                                   <div className="h-[1px] flex-1 bg-gradient-to-r from-orange-300/50 to-transparent" />
                                </div>
                            </div>
                        </div>

                        {/* 第二階段動畫：Slogan (延遲) */}
                        <div className="anim-phase-2 flex flex-col gap-2 items-center">
                            {renderLine(line1)}
                            {renderLine(line2)}
                        </div>
                        
                    </div>
                </div>
            );
        };

        // --- Slide 3: Prize ---
        const PrizeSlide = () => {
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                    <div className="watermark-text" style={{ top: '10%', left: '-10%' }}>$200,000</div>
                    <div className="watermark-text" style={{ bottom: '5%', right: '-5%' }}>$200,000</div>
                    <div className="relative z-10 flex flex-col items-center w-full max-w-6xl transform -translate-y-12">
                        <div className="w-full flex justify-start mb-6">
                            <span className="text-orange-300/90 text-2xl md:text-4xl font-bold tracking-wide ml-8 md:ml-16 drop-shadow-md">唔係講笑...</span>
                        </div>
                        <div className="mb-14">
                            <h2 className="text-6xl md:text-[8.5rem] font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-orange-300 to-orange-400 drop-shadow-2xl text-center leading-[1.1]">
                                今晚獎金、獎品<br />非常豐富！！
                            </h2>
                        </div>
                        <div className="flex items-center gap-6 bg-black/30 backdrop-blur-md px-10 py-4 rounded-full border border-orange-300/20 shadow-xl">
                            <div className="w-5 h-5 bg-orange-400 rounded-full shadow-[0_0_20px_rgba(251,146,60,0.8)]" />
                            <span className="text-2xl md:text-5xl font-bold text-orange-300/90 tracking-widest uppercase">總值超過 HKD $200,000</span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Slide 4: Game ---
        const GameSlide = () => {
            return (
                <div className="absolute inset-0 flex items-center justify-center z-10 px-6 animate-slide-up">
                    <div className="watermark-text" style={{ top: '5%', left: '5%' }}>被選中嘅幸運兒</div>
                    <div className="watermark-text" style={{ bottom: '10%', right: '5%' }}>被選中嘅幸運兒</div>
                    <div className="w-full max-w-6xl relative z-10 transform -translate-y-12">
                        <div className="flex flex-col items-center w-full">
                            <div className="w-full flex justify-between items-end mb-16 border-b border-white/10 pb-4">
                                <div className="flex flex-col items-start">
                                    <span className="text-orange-200/90 text-4xl md:text-6xl font-bold tracking-wide drop-shadow-md">Game 1</span>
                                </div>
                                <div className="text-right">
                                    <span className="text-orange-300 text-2xl md:text-5xl font-bold tracking-[0.2em] drop-shadow-lg">被選中嘅幸運兒</span>
                                </div>
                            </div>
                            <div className="flex flex-col items-center text-center">
                                <span className="text-orange-300/90 text-3xl md:text-5xl font-bold tracking-[0.5em] mb-8">玩法</span>
                                <p className="text-orange-100/90 text-3xl md:text-5xl font-bold tracking-widest leading-relaxed mb-14">每枱選中之號碼，該人可獲得</p>
                                <div className="flex items-center justify-center gap-6 md:gap-14 scale-95 md:scale-100">
                                    <span className="text-7xl md:text-[11rem] font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-orange-300 to-orange-400 drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)]">現金</span>
                                    <span className="text-6xl md:text-[9rem] font-black text-red-500 drop-shadow-2xl mb-4">+</span>
                                    <span className="text-7xl md:text-[11rem] font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-pink-300 via-purple-400 to-blue-500 drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)]">獎品</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Controller ---
        const BackgroundMusic = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const playerRef = useRef(null);
            useEffect(() => {
                window.onYouTubeIframeAPIReady = () => {
                    playerRef.current = new YT.Player('youtube-player', {
                        height: '0', width: '0', videoId: YOUTUBE_VIDEO_ID,
                        playerVars: { autoplay: 1, loop: 1, playlist: YOUTUBE_VIDEO_ID, controls: 0 },
                        events: { onReady: (e) => { e.target.mute(); e.target.playVideo(); } }
                    });
                };
                if (window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
            }, []);
            const toggle = () => {
                if (!playerRef.current) return;
                if (isPlaying) playerRef.current.mute(); else { playerRef.current.unMute(); playerRef.current.setVolume(50); }
                setIsPlaying(!isPlaying);
            };
            return (
                <div className="fixed top-8 right-8 z-50 flex items-center gap-4">
                    <div id="youtube-player" className="hidden"></div>
                    {isPlaying && <div className="flex items-end h-5 mb-1">{[0,0.2,0.4,0.1].map((d,i)=><div key={i} className="music-bar" style={{animationDelay:`${d}s`}}></div>)}</div>}
                    <button onClick={toggle} className="p-4 bg-white/10 hover:bg-emerald-500/30 border border-white/20 rounded-full transition-all backdrop-blur-xl text-white/90 shadow-lg">{isPlaying ? <IconMusic /> : <IconMusicOff />}</button>
                </div>
            );
        };

        function App() {
            const [slide, setSlide] = useState(0);
            const [zoom, setZoom] = useState(false);
            const [focusImg, setFocusImg] = useState(null);
            const items = useMemo(() => buildItems(INITIAL_IMAGES, 120), []);
            return (
                <div className="relative w-full h-screen bg-[#010401] overflow-hidden select-none">
                    <BackgroundMusic />
                    <div className="absolute inset-0 z-0 scale-125"><div className="aurora-fluid aurora-v1"/><div className="aurora-fluid aurora-v2"/><div className="aurora-fluid aurora-v3"/></div>
                    {slide === 0 && <GallerySlide items={items} radius={FIXED_RADIUS} isZoomed={zoom} setFocusedImage={setFocusImg} setIsZoomed={setZoom} />}
                    {slide === 1 && <SloganSlide />}
                    {slide === 2 && <PrizeSlide />}
                    {slide === 3 && <GameSlide />}
                    <div className="fixed bottom-12 left-1/2 -translate-x-1/2 z-40 flex items-center gap-10">
                        <button onClick={()=>setSlide(p=>Math.max(0,p-1))} className={`p-5 rounded-full border transition-all ${slide>0 ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-400' : 'opacity-20'}`}><IconChevronLeft size={32}/></button>
                        <div className="flex gap-4">{[0,1,2,3].map(i=><div key={i} className={`w-3 h-3 rounded-full transition-all ${slide===i ? 'bg-emerald-400 w-10' : 'bg-white/20'}`}/>)}</div>
                        <button onClick={()=>setSlide(p=>Math.min(3,p+1))} className={`p-5 rounded-full border transition-all ${slide<3 ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-400' : 'opacity-20'}`}><IconChevronRight size={32}/></button>
                    </div>
                    {zoom && focusImg && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/98 backdrop-blur-3xl animate-fade-in p-4" onClick={()=>setZoom(false)}>
                            <div className="relative max-w-6xl max-h-[85vh] shadow-2xl rounded-2xl border border-white/10 overflow-hidden"><img src={focusImg.src} referrerPolicy="no-referrer" className="block w-full h-full object-contain" /></div>
                            <button className="absolute top-8 right-8 p-4 bg-white/10 text-white rounded-full"><IconX /></button>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
