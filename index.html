    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010401;
            overflow: hidden;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: manipulation;
        }

        #preloader {
            position: fixed; inset: 0;
            background-color: #010401;
            z-index: 10000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .loader-bar-bg {
            width: 240px; height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 24px; position: relative;
            overflow: hidden;
        }
        .loader-bar-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            background: #10b981; width: 0%;
            transition: width 0.3s ease;
        }

        .aurora-fluid { 
            position: absolute; 
            width: 140vw; height: 140vh; 
            filter: blur(100px); opacity: 0.5; 
            mix-blend-mode: screen; will-change: transform;
            z-index: 0;
        }
        .aurora-v1 { background: radial-gradient(circle at 20% 20%, #064e3b 0%, transparent 65%); animation: aurora-flow 30s infinite alternate ease-in-out; top: -10%; left: -10%; }
        .aurora-v2 { background: radial-gradient(circle at 80% 80%, #065f46 0%, transparent 65%); animation: aurora-flow 35s infinite alternate-reverse ease-in-out; bottom: -10%; right: -10%; }
        .aurora-v3 { background: radial-gradient(circle at 50% 50%, #0d9488 0%, transparent 55%); animation: aurora-flow 25s infinite alternate ease-in-out; top: 15%; left: 15%; }
        
        .aurora-bonus { background: radial-gradient(circle at 50% 50%, #9a3412 0%, transparent 75%); }

        @keyframes aurora-flow {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(-5%,10%) rotate(-5deg); }
        }

        .text-white-gold {
            background: linear-gradient(to bottom, #ffffff 0%, #fef3c7 45%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
        }

        .text-soft-gold-glow {
            background: linear-gradient(to bottom, #ffffff 0%, #fff9e6 45%, #fef3c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 35px rgba(254, 243, 199, 0.6));
        }

        .text-purple-glow {
            background: linear-gradient(to bottom, #f0abfc, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(168, 85, 247, 0.9));
        }

        .text-emerald-glow {
            background: linear-gradient(to bottom, #ffffff, #6ee7b7, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(16, 185, 129, 0.6));
        }

        /* Slide Transition Animations */
        .slide-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .slide-item {
            position: absolute; inset: 0;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .slide-enter-next { transform: translateX(100%); opacity: 0; }
        .slide-active { transform: translateX(0); opacity: 1; z-index: 20; }
        .slide-exit-next { transform: translateX(-100%); opacity: 0; }
        .slide-enter-prev { transform: translateX(-100%); opacity: 0; }
        .slide-exit-prev { transform: translateX(100%); opacity: 0; }

        .preserve-3d { transform-style: preserve-3d; }
        .interaction-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.92);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            backdrop-blur: 40px;
        }

        .content-wrapper { transition: filter 2.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; width: 100%; }
        .is-blurred { filter: blur(70px); pointer-events: none; }
        .is-revealed { filter: blur(0px); pointer-events: auto; }

        /* Liquid Glass Controller */
        .liquid-glass-panel {
            position: fixed; top: 50%; right: 30px; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 20px 15px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 15px;
            animation: panel-fade-in 0.5s ease-out;
        }
        @keyframes panel-fade-in { from { opacity: 0; transform: translate(30px, -50%); } to { opacity: 1; transform: translate(0, -50%); } }
        
        .song-btn {
            width: 55px; height: 55px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s;
            font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }
        .song-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
        .song-btn.active {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.6);
            color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        /* Bonus Effects */
        .bonus-box {
            padding: 50px 100px;
            background: rgba(0,0,0,0.8);
            border: 6px solid #f97316;
            border-radius: 50px;
            box-shadow: 0 0 40px #f97316, inset 0 0 30px #ea580c;
            animation: bonus-impact 1.2s infinite alternate ease-in-out, bonus-shake 0.2s infinite;
            z-index: 50;
        }
        @keyframes bonus-impact {
            from { transform: scale(0.9) rotate(-1deg); box-shadow: 0 0 60px #f97316; }
            to { transform: scale(1.1) rotate(1deg); box-shadow: 0 0 150px #f97316, 0 0 50px #fbbf24; }
        }
        @keyframes bonus-shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(2px, 0px); }
        }

        .bouncing-text {
            position: absolute;
            font-weight: 900;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            color: #f97316;
            text-transform: uppercase;
        }
    </style>
</head>

        function buildDomeStructure(pool) {
            const items = [];
            const rows = 5; 
            const itemsPerRow = Math.ceil(pool.length / rows);
            pool.forEach((id, i) => {
                const rowIndex = (i % rows) - (rows - 1) / 2;
                const colIndex = Math.floor(i / rows);
                items.push({ yaw: colIndex * (360 / itemsPerRow), pitch: rowIndex * 15, id });
            });
            return items;
        }

        // --- 2. 子組件 ---

        function BouncingTextFX({ text, count = 30 }) {
            const [particles, setParticles] = useState([]);
            const requestRef = useRef();
            useEffect(() => {
                const w = window.innerWidth, h = window.innerHeight;
                setParticles(Array.from({ length: count }).map(() => ({
                    x: Math.random() * (w - 150), y: Math.random() * (h - 100),
                    vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15,
                    size: Math.random() * 8 + 4, op: Math.random() * 0.25 + 0.1, blur: Math.random() * 2
                })));
            }, [count]);
            useEffect(() => {
                const anim = () => {
                    setParticles(prev => prev.map(p => {
                        let nx = p.x + p.vx, ny = p.y + p.vy, nvx = p.vx, nvy = p.vy;
                        if (nx < 0 || nx > window.innerWidth - 150) nvx *= -1;
                        if (ny < 0 || ny > window.innerHeight - 80) nvy *= -1;
                        return { ...p, x: nx, y: ny, vx: nvx, vy: nvy };
                    }));
                    requestRef.current = requestAnimationFrame(anim);
                };
                requestRef.current = requestAnimationFrame(anim);
                return () => cancelAnimationFrame(requestRef.current);
            }, []);
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden z-0">
                    {particles.map((p, i) => (
                        <div key={i} className="bouncing-text" style={{ 
                            left: p.x, top: p.y, fontSize: `${p.size}vw`, opacity: p.op, filter: `blur(${p.blur}px)` 
                        }}>{text}</div>
                    ))}
                </div>
            );
        }

        function GallerySlide({ items, isZoomed, setIsZoomed, setFocusedImage, isActive }) {
            const stageRef = useRef(null);
            const rotationRef = useRef(0);
            const [radius, setRadius] = useState(1100);
            useEffect(() => {
                const update = () => setRadius(window.innerWidth < 768 ? 700 : 1100);
                update(); window.addEventListener('resize', update);
                return () => window.removeEventListener('resize', update);
            }, []);
            useEffect(() => {
                if (!isActive) return;
                let timer;
                if (isZoomed) {
                    timer = setTimeout(() => setIsZoomed(false), 6000);
                } else {
                    timer = setTimeout(() => {
                        const randomImg = items[Math.floor(Math.random() * items.length)];
                        setFocusedImage(randomImg);
                        setIsZoomed(true);
                    }, 5000);
                }
                return () => clearTimeout(timer);
            }, [isZoomed, isActive, items, setIsZoomed, setFocusedImage]);
            useEffect(() => {
                let raf;
                const animate = () => {
                    if (!isZoomed && stageRef.current) {
                        rotationRef.current += 0.12; 
                        stageRef.current.style.transform = `translate3d(0, 0, ${-radius}px) rotateY(${rotationRef.current}deg)`;
                    }
                    raf = requestAnimationFrame(animate);
                };
                raf = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(raf);
            }, [isZoomed, radius]);
            return (
                <div className="absolute inset-0 flex items-center justify-center [perspective:1200px] z-10 transition-all duration-1000"
                    style={{ transform: isZoomed ? 'scale(0.85) translateZ(-150px)' : 'scale(1)', opacity: isZoomed ? 0.2 : 1 }}>
                    <div ref={stageRef} className="relative w-0 h-0 [transform-style:preserve-3d]">
                        {items.map((it, i) => (
                            <div key={i} className="absolute w-[210px] h-[135px] md:w-[320px] md:h-[200px] -left-[105px] md:-left-[160px] -top-[67px] md:-top-[100px] [transform-style:preserve-3d]"
                                style={{ transform: `rotateY(${it.yaw}deg) rotateX(${-it.pitch}deg) translateZ(${radius}px)` }}>
                                <div className="photo-grid-item w-full h-full bg-white/5 rounded-2xl border border-white/20 overflow-hidden shadow-2xl cursor-pointer"
                                     onClick={(e) => { e.stopPropagation(); setFocusedImage(it); setIsZoomed(true); }}>
                                    <img src={`https://drive.google.com/thumbnail?id=${it.id}&sz=w1000`} className="w-full h-full object-cover opacity-70" loading="lazy" />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- 3. 主程序 ---

        function App() {
            const [slide, setSlide] = useState(0);
            const [dir, setDir] = useState('next');
            const [isReady, setIsReady] = useState(false);
            const [interacted, setInteracted] = useState(false);
            const [isZoomed, setIsZoomed] = useState(false);
            const [focusedImage, setFocusedImage] = useState(null);
            const [isMuted, setIsMuted] = useState(false);
            const [activeGallerySong, setActiveGallerySong] = useState('go');

            const audios = useRef({});
            const activeZoneRef = useRef(null);

            const domeItems = useMemo(() => buildDomeStructure(PHOTO_IDS), []);

            const playAudioZone = (zoneKey, files, loop = true) => {
                if (activeZoneRef.current === zoneKey) return;
                
                if (activeZoneRef.current && audios.current[activeZoneRef.current]) {
                    audios.current[activeZoneRef.current].pause();
                    audios.current[activeZoneRef.current].currentTime = 0;
                }

                const fileArr = Array.isArray(files) ? files : [files];
                let currentIdx = 0;

                const playNext = () => {
                    if (!interacted) return;
                    const audio = new Audio(fileArr[currentIdx]);
                    audio.muted = isMuted;
                    audio.volume = 1;
                    audio.play().catch(()=>{});
                    
                    audio.onended = () => {
                        currentIdx = (currentIdx + 1) % fileArr.length;
                        if (loop || currentIdx !== 0) playNext();
                    };
                    audios.current[zoneKey] = audio;
                };

                playNext();
                activeZoneRef.current = zoneKey;
            };

            const handleGallerySongChange = (key) => {
                setActiveGallerySong(key);
                activeZoneRef.current = null; // 強制重置
            };

            const changeSlide = (n) => { 
                setDir(n > slide ? 'next' : 'prev'); 
                setSlide(n); 
                setIsZoomed(false);
            };

                <div className="h-full text-center flex flex-col justify-center items-center"><h2 className="text-[15vw] md:text-[15rem] font-black italic text-emerald-glow tracking-tighter uppercase leading-none">GAME TIME!</h2></div>,
                <div className="flex flex-col h-full items-center justify-center text-center gap-12">
                    <div className="text-left w-full max-w-7xl px-10 md:px-20"><span className="text-yellow-500 text-3xl md:text-5xl font-bold uppercase italic">唔係講笑...</span><p className="text-white/40 text-xl md:text-3xl uppercase italic font-medium mt-2">Seriously...</p></div>
                    <div className="flex flex-col gap-6">
                        <h2 className="text-6xl md:text-[11rem] font-black tracking-wider text-soft-gold-glow leading-tight">今晚獎金、獎品<br />非常豐富！！</h2>
                        <p className="text-white/40 text-2xl md:text-5xl uppercase font-medium mt-4">Massive prizes & cash await!!</p>
                    </div>
                </div>,
                <div className="h-full text-center px-6 flex flex-col justify-center items-center">
                    <div className="w-full max-w-6xl mb-12 border-b border-white/10 pb-4 flex justify-between items-end text-left"><span className="text-emerald-400 text-xl md:text-3xl font-bold uppercase">Game 1</span><span className="text-white text-2xl md:text-4xl font-black text-right uppercase">被抽中的枱號</span></div>
                    <div className="flex flex-col items-center gap-6"><p className="text-2xl md:text-4xl font-bold text-white opacity-90 uppercase">被抽中的枱號，每人皆可獲得</p><p className="text-lg md:text-xl text-white/40 uppercase tracking-widest italic">Every guest wins when their table number is drawn!</p><span className="text-purple-glow font-black text-8xl md:text-[15rem] mt-10 shadow-2xl">豐富獎品</span><span className="text-purple-400/60 text-2xl md:text-5xl uppercase font-bold tracking-widest italic mt-2 uppercase">Fabulous Prizes</span></div>
                </div>,
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} isActive={slide === 11} />,
                <div className="h-full px-4 md:px-6 flex flex-col justify-center items-center">
                    <div className="w-full max-w-7xl mb-12 border-b border-white/10 pb-4 flex justify-between items-end"><span className="text-emerald-400 text-2xl md:text-6xl font-bold tracking-wide uppercase">Game 2</span><span className="text-white text-4xl md:text-8xl font-bold uppercase text-right">競飲</span></div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8 w-full max-w-7xl h-[200px] md:h-[300px]">
                        {[1,2,3].map(idx => (<div key={idx} className="flex flex-col h-full flex-1 relative"><div className="flex-grow bg-white/5 border border-white/10 p-8 rounded-xl cursor-pointer transition-all duration-1000 flex flex-col justify-center items-center blur-2xl active:blur-0"><p className="text-white text-2xl md:text-4xl font-black uppercase">Revealing Group {idx}</p></div><div className="mt-4 text-emerald-500 animate-bounce flex justify-center text-3xl">↓</div><div className="w-full bg-white/5 border border-white/20 py-4 rounded-lg text-center mt-2 shadow-lg"><span className="text-xl font-black text-white uppercase opacity-90 block">晉級</span><span className="text-xs text-white/50 uppercase font-bold tracking-tighter">PROMOTED</span></div></div>))}
                    </div>
                    <div className="mt-16 flex flex-col items-center px-10 py-8 md:px-32 md:py-12 bg-gradient-to-r from-emerald-600/30 to-emerald-400/30 border-2 border-emerald-400/60 rounded-2xl"><span className="text-4xl md:text-9xl font-black text-purple-glow uppercase leading-none">冠・亞・季</span><span className="text-xl md:text-4xl text-white/80 font-medium italic mt-4">Champion • 1st • 2nd Runner-up</span></div>
                </div>,
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} isActive={slide === 13} />,
                <div className="h-full px-6 flex flex-col justify-center items-center">
                    <div className="w-full max-w-6xl transform -translate-y-8">
                        <div className="flex justify-between items-end mb-10 border-b border-white/10 pb-4"><span className="text-emerald-400 text-2xl md:text-5xl font-bold uppercase text-left">Game 3</span><div className="flex flex-col items-end"><span className="text-white text-5xl md:text-8xl font-black drop-shadow-2xl text-right">Bingo!</span><span className="text-white/40 text-xl md:text-2xl uppercase tracking-[0.2em]">Bingo Challenge</span></div></div>
                        <div className="space-y-6 md:space-y-12 pl-6 border-l-4 border-emerald-500/50 text-left">
                            <div className="flex flex-col gap-1"><div className="flex items-center gap-6"><div className="w-10 h-10 md:w-14 md:h-14 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-xl">1</div><p className="text-xl md:text-5xl font-bold text-white leading-tight">每人手上已有一張「六合彩飛」</p></div><p className="text-white/40 text-sm md:text-xl ml-16 md:ml-20 uppercase">Each guest holds a "Mark Six" ticket.</p></div>
                            <div className="flex flex-col gap-1"><div className="flex items-center gap-6"><div className="w-10 h-10 md:w-14 md:h-14 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-xl">2</div><p className="text-xl md:text-5xl font-bold text-white leading-tight">會從 1 - 49 號中抽數字</p></div><p className="text-white/40 text-sm md:text-xl ml-16 md:ml-20 uppercase">Numbers 1-49 will be drawn randomly.</p></div>
                            <div className="flex flex-col gap-1"><div className="flex items-center gap-6"><div className="w-10 h-10 md:w-14 md:h-14 bg-emerald-500 text-black rounded-full flex items-center justify-center font-black text-xl">3</div><p className="text-xl md:text-5xl font-bold text-white leading-tight">最快集齊 <span class='text-emerald-400 font-black'>6</span> 組號碼</p></div><p className="text-white/40 text-sm md:text-xl ml-16 md:ml-20 uppercase">First to complete 6 sets of numbers wins!</p></div>
                            <div className="p-4 md:p-10 bg-red-600/20 border-2 border-red-500/30 rounded-2xl mt-10 shadow-2xl flex flex-col gap-2"><p className="text-lg md:text-4xl font-black text-red-500 tracking-wider uppercase leading-none">名額五個，記得盡快舉手行出嚟喇！</p><p className="text-sm md:text-xl font-bold text-red-400/60 uppercase">Only 5 winners! Raise your hand ASAP!</p></div>
                        </div>
                    </div>
                </div>,
                <GallerySlide items={domeItems} isZoomed={isZoomed} setIsZoomed={setIsZoomed} setFocusedImage={setFocusedImage} isActive={slide === 15} />,
                <div className="h-full text-center flex flex-col justify-center items-center"><h2 className="text-8xl md:text-[15rem] font-black text-white-gold leading-none py-8 uppercase">抽獎環節</h2><span className="text-white/60 text-4xl md:text-7xl font-light uppercase mt-6 italic tracking-widest leading-none">Lucky Draw Session</span></div>,
                <div className="h-full flex items-center justify-center overflow-hidden relative">
                    <BouncingTextFX text="加碼" count={30} />
                    <div className="absolute inset-0 aurora-bonus blur-[120px] opacity-60" />
                    <div className="bonus-box z-10 text-center"><h2 className="text-7xl md:text-[14rem] font-black text-orange-500 italic uppercase leading-none">加碼！！</h2></div>
                </div>,
                <div className="h-full flex items-center justify-center overflow-hidden relative">
                    <BouncingTextFX text="再加碼" count={30} />
                    <div className="absolute inset-0 aurora-bonus blur-[120px] opacity-60" />
                    <div className="bonus-box z-10 text-center border-[#ea580c] shadow-[0_0_120px_rgba(234,88,12,0.8)]"><h2 className="text-7xl md:text-[14rem] font-black text-[#ea580c] italic uppercase leading-none">再加碼！！</h2></div>
                </div>,
                <div className="flex flex-col items-center justify-center h-full text-center gap-12 px-6">
                    <h2 className="text-5xl md:text-9xl lg:text-[11rem] font-bold text-white tracking-widest italic drop-shadow-2xl leading-none">感謝各位蒞臨</h2>
                    <div className="flex flex-col gap-4">
                        <p className="text-2xl md:text-5xl lg:text-[6.5rem] font-bold text-white/90 whitespace-nowrap tracking-wider uppercase">2026 冠恒集團春茗</p>
                        <p className="text-2xl md:text-5xl lg:text-[6.5rem] font-bold text-white/90 whitespace-nowrap tracking-wider leading-snug uppercase">圓滿結束</p>
                    </div>
                    <h3 className="text-6xl md:text-9xl lg:text-[13rem] font-black text-yellow-400 italic animate-pulse mt-6 uppercase leading-none">下年再見!</h3>
                </div>
            ];

            useEffect(() => {
                if (!isReady || !interacted) return;
                // 分頁音效管理
                if (slide === 0) playAudioZone('d1', BGM_CONFIG.go);
                else if (slide === 1) playAudioZone('sl', BGM_CONFIG.welcome);
                else if (slide === 2) playAudioZone('sp', BGM_CONFIG.boss);
                else if (slide >= 3 && slide <= 7) playAudioZone('sr', BGM_CONFIG.misshk);
                else if (slide >= 8 && slide <= 10) playAudioZone('g1', BGM_CONFIG.ukulele);
                else if (slide === 11 || slide === 13 || slide === 15) playAudioZone('dome_int', BGM_CONFIG[activeGallerySong]);
                else if (slide === 12) playAudioZone('g2', BGM_CONFIG.game2Seq);
                else if (slide === 14) playAudioZone('g3', BGM_CONFIG.mark6);
                else if (slide === 16) playAudioZone('dr', BGM_CONFIG.draw);
                else if (slide === 17) playAudioZone('s1', BGM_CONFIG.sb1);
                else if (slide === 18) playAudioZone('s2', BGM_CONFIG.sb2);
                else { if (activeZoneRef.current && audios.current[activeZoneRef.current]) audios.current[activeZoneRef.current].pause(); activeZoneRef.current = null; }
            }, [slide, interacted, activeGallerySong, isReady]);

            useEffect(() => { Object.values(audios.current).forEach(a => { if (a) a.muted = isMuted; }); }, [isMuted]);

            useEffect(() => {
                let imgL = 0, audL = 0;
                const imgU = PHOTO_IDS.map(id => `https://drive.google.com/thumbnail?id=${id}&sz=w1000`);
                const audU = Object.values(BGM_CONFIG).flat();
                const total = imgU.length + audU.length;
                const check = () => {
                    const prog = ((imgL + audL) / total) * 100;
                    if (document.getElementById('loader-fill')) document.getElementById('loader-fill').style.width = prog + '%';
                    if (imgL + audL >= total) {
                        const pre = document.getElementById('preloader'); if (pre) pre.style.opacity = '0';
                        setTimeout(() => { if (pre) pre.style.display = 'none'; setIsReady(true); }, 1000);
                    }
                };
                imgU.forEach(u => { const i = new Image(); i.src = u; i.onload = i.onerror = () => { imgL++; check(); }; });
                audU.forEach(u => { const a = new Audio(u); a.oncanplaythrough = a.onerror = () => { audL++; check(); }; a.load(); });
                setTimeout(() => { if (!isReady) setIsReady(true); }, 45000);
            }, []);

            if (!isReady) return null;

            return (
                <div className="relative w-full h-screen bg-[#010401] overflow-hidden select-none">
                    {!interacted && (
                        <div className="interaction-overlay" onClick={() => setInteracted(true)}>
                            <img src="Logo.png" alt="Logo" className="w-48 h-48 object-contain mb-8 animate-pulse" />
                            <h2 className="text-3xl font-bold tracking-[0.5em] text-white-gold mb-4 uppercase">歡迎進入</h2>
                            <p className="text-emerald-400 tracking-[0.3em] animate-bounce">TAP TO START CEREMONY</p>
                        </div>
                    )}
                    <div className={`content-wrapper h-full w-full ${!interacted ? 'is-blurred' : 'is-revealed'}`}>
                        <div className="fixed top-6 left-6 z-[100]"><button onClick={() => setIsMuted(!isMuted)} className="p-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full transition-all shadow-2xl backdrop-blur-md">{isMuted ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg> : <div className="flex items-center gap-2"><div className="flex items-end h-3 gap-0.5">{[0.1, 0.4, 0.2, 0.5].map((d, i) => (<div key={i} className="w-0.5 bg-yellow-400 animate-bounce" style={{ height: '100%', animationDelay: `${d}s` }} />))}</div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></div>}</button></div>
                        <div className="slide-num-label">{slide + 1} / {allSlides.length}</div>

                        {(slide === 11 || slide === 13 || slide === 15) && interacted && (
                            <div className="liquid-glass-panel">
                                <button onClick={() => handleGallerySongChange('go')} className={`song-btn ${activeGallerySong === 'go' ? 'active' : ''}`}>Go</button>
                                <button onClick={() => handleGallerySongChange('breathe')} className={`song-btn ${activeGallerySong === 'breathe' ? 'active' : ''}`}>Air</button>
                                <button onClick={() => handleGallerySongChange('masterclass')} className={`song-btn ${activeGallerySong === 'masterclass' ? 'active' : ''}`}>MC</button>
                            </div>
                        )}

                        <div className="absolute inset-0 z-0 pointer-events-none opacity-100"><div className="aurora-fluid aurora-v1"/><div className="aurora-fluid aurora-v2"/><div className="aurora-fluid aurora-v3"/></div>
                        <div className="slide-container">
                            {allSlides.map((content, idx) => (
                                <div key={idx} className={`slide-item ${idx === slide ? 'slide-active' : (idx < slide ? (dir === 'next' ? 'slide-exit-next' : 'slide-enter-prev') : (dir === 'next' ? 'slide-enter-next' : 'slide-exit-prev'))}`} style={{ visibility: Math.abs(idx - slide) > 1 ? 'hidden' : 'visible' }}>{content}</div>
                            ))}
                        </div>
                        <div className="fixed bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 z-50 flex items-center gap-4">
                            <button onClick={()=>changeSlide(Math.max(0, slide-1))} className="p-4 bg-white/5 md:bg-white/10 rounded-full border border-white/20 active:bg-emerald-500/40 transition-all shadow-lg pointer-events-auto"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                            <div className="flex gap-1.5 flex-wrap justify-center max-w-[200px] md:max-w-[800px]">{allSlides.map((_,i)=><div key={i} className={`w-1 h-1 md:w-1.5 md:h-1.5 rounded-full transition-all ${slide===i ? 'bg-yellow-400 w-3 md:w-6' : 'bg-white/10'}`}/>)}</div>
                            <button onClick={()=>changeSlide(Math.min(allSlides.length-1, slide+1))} className="p-4 bg-white/5 md:bg-white/10 rounded-full border border-white/20 active:bg-emerald-500/40 transition-all shadow-lg pointer-events-auto"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                        </div>
                    </div>
                    {isZoomed && focusedImage && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/98 backdrop-blur-3xl p-4" onClick={() => setIsZoomed(false)}>
                            <div className="relative max-w-[95vw] max-h-[85vh] md:max-w-6xl md:max-h-[85vh] shadow-2xl rounded-[24px] md:rounded-[32px] border border-white/10 overflow-hidden zoom-in-container"><img src={`https://drive.google.com/thumbnail?id=${focusedImage.id}&sz=w1000`} className="block w-full h-full object-contain" /><div className="absolute top-4 right-4 p-2 bg-black/40 text-white rounded-full">✕</div></div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
