<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡 3D 晚宴畫廊</title>
    
    <!-- 1. 最優先定義環境變數，防止第三方庫報錯 -->
    <script>
        window.process = { env: { NODE_ENV: 'production' } };
    </script>
    
    <!-- 2. 引入必要的核心庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 3. 引入手勢庫 (使用 UMD 版本) -->
    <script src="https://cdn.jsdelivr.net/npm/@use-gesture/vanilla@10.3.1/dist/use-gesture-vanilla.umd.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            background: #0a0a0a; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        #root { width: 100%; height: 100%; }

        .sphere-root { 
            --radius: 600px; 
            --tile-radius: 4px; 
            width: 100%; 
            height: 100%; 
            background: #0a0a0a; 
            overflow: hidden; 
            position: relative; 
        }

        .sphere-main { 
            width: 100%; 
            height: 100%; 
            perspective: 1200px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            touch-action: none;
        }

        .stage { 
            width: 100%; 
            height: 100%; 
            transform-style: preserve-3d; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .sphere { 
            transform-style: preserve-3d; 
            width: 0; 
            height: 0; 
            position: relative; 
            will-change: transform; 
            transition: transform 0.1s linear; 
        }

        .item { 
            position: absolute; 
            transform-style: preserve-3d; 
            width: 140px; 
            height: 180px; 
            left: -70px; 
            top: -90px;
        }

        .item__image { 
            width: 100%; 
            height: 100%; 
            cursor: pointer; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            border-radius: var(--tile-radius); 
            overflow: hidden; 
            background: #1a1a1a; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .item__image img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            pointer-events: none; 
        }
        
        .item__image.focused { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            width: 400px; 
            height: 500px; 
            transform: translate(-50%, -50%) scale(1.2) !important; 
            z-index: 100; 
            box-shadow: 0 0 100px rgba(0,0,0,1); 
        }
        
        .scrim { 
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.6s ease; 
            z-index: 50; 
        }

        .overlay--blur { 
            position: absolute; 
            inset: 0; 
            pointer-events: none; 
            background: radial-gradient(circle at center, transparent 30%, #0a0a0a 100%); 
            z-index: 10; 
        }
        
        .nav-btn { 
            position: fixed; 
            right: 40px; 
            top: 50%; 
            transform: translateY(-50%); 
            padding: 15px; 
            background: none; 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 100; 
            transition: 0.3s; 
        }

        .nav-btn:hover { 
            background: white; 
            color: black; 
            border-color: white; 
        }

        .info-tag { 
            position: fixed; 
            top: 40px; 
            left: 40px; 
            color: rgba(255,255,255,0.3); 
            font-size: 10px; 
            letter-spacing: 0.4em; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 4. React 代碼區塊 -->
    <script type="text/babel">
        const { useEffect, useMemo, useRef, useCallback, useState } = React;

        const DRIVE_IDS = [
          '1_UDb1eM70zzDceSal-FoVtGG5gKvC2G5',
          '1C3rOoEzaVnu4n43vEirqvUiXJ0ooLmPW',
          '1MkJ9nGP7JuR9ykoZOo5Dt4WD8mhMn9TD',
          '1D3PQIbYFjWSkOlR1mSPpJJYSObEQwPCY'
        ];

        const INITIAL_IMAGES = DRIVE_IDS.map(id => ({
          src: `https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
          alt: 'Dinner Archive'
        }));

        const wrapAngleSigned = (deg) => {
          const a = (((deg + 180) % 360) + 360) % 360;
          return a - 180;
        };

        const buildItems = (pool, seg) => {
          if (!pool || pool.length === 0) return [];
          const xCols = Array.from({ length: seg }, (_, i) => -37 + i * 2);
          const evenYs = [-4, -2, 0, 2, 4];
          const oddYs = [-3, -1, 1, 3, 5];
          const coords = xCols.flatMap((x, c) => {
            const ys = c % 2 === 0 ? evenYs : oddYs;
            return ys.map(y => ({ x, y, sizeX: 2, sizeY: 2 }));
          });
          return coords.map((c, i) => ({
            ...c,
            src: pool[i % pool.length].src,
            alt: pool[i % pool.length].alt
          }));
        };

        // --- DomeGallery 組件 ---
        function DomeGallery({ images }) {
          const rootRef = useRef(null);
          const mainRef = useRef(null);
          const sphereRef = useRef(null);
          const scrimRef = useRef(null);
          const focusedElRef = useRef(null);
          
          const [isZoomed, setIsZoomed] = useState(false);
          const rotationRef = useRef({ x: 0, y: 0 });
          const startRotRef = useRef({ x: 0, y: 0 });
          const draggingRef = useRef(false);
          const autoRotateRef = useRef(true);
          const segments = 34;
          const fit = 0.8;

          const items = useMemo(() => buildItems(images, segments), [images]);

          const applyTransform = useCallback((xDeg, yDeg) => {
            if (sphereRef.current) {
              sphereRef.current.style.transform = `translateZ(calc(var(--radius) * -1)) rotateX(${xDeg}deg) rotateY(${yDeg}deg)`;
            }
          }, []);

          useEffect(() => {
            let raf;
            const rotate = () => {
              if (!draggingRef.current && !isZoomed && autoRotateRef.current) {
                rotationRef.current.y = wrapAngleSigned(rotationRef.current.y + 0.1);
                applyTransform(rotationRef.current.x, rotationRef.current.y);
              }
              raf = requestAnimationFrame(rotate);
            };
            raf = requestAnimationFrame(rotate);
            return () => cancelAnimationFrame(raf);
          }, [isZoomed, applyTransform]);

          useEffect(() => {
            let timer;
            const startCycle = () => {
              timer = setTimeout(() => {
                const itemEls = sphereRef.current?.querySelectorAll('.item__image');
                if (itemEls && itemEls.length > 0 && !isZoomed && !draggingRef.current) {
                  const randomIndex = Math.floor(Math.random() * itemEls.length);
                  openItem(itemEls[randomIndex]);
                  setTimeout(() => {
                    closeItem();
                    startCycle();
                  }, 6000);
                } else if (!isZoomed) {
                  startCycle();
                }
              }, 8000);
            };
            startCycle();
            return () => clearTimeout(timer);
          }, [images, isZoomed]);

          useEffect(() => {
            const root = rootRef.current;
            if (!root) return;
            const ro = new ResizeObserver(entries => {
              const cr = entries[0].contentRect;
              const radius = Math.max(600, cr.width * fit);
              root.style.setProperty('--radius', `${Math.round(radius)}px`);
            });
            ro.observe(root);
            return () => ro.disconnect();
          }, [fit]);

          const openItem = (el) => {
            if (focusedElRef.current) return;
            focusedElRef.current = el;
            setIsZoomed(true);
            el.classList.add('focused');
            if (scrimRef.current) {
                scrimRef.current.style.opacity = '1';
                scrimRef.current.style.pointerEvents = 'auto';
            }
          };

          const closeItem = () => {
            if (focusedElRef.current) {
              focusedElRef.current.classList.remove('focused');
              focusedElRef.current = null;
            }
            setIsZoomed(false);
            if (scrimRef.current) {
                scrimRef.current.style.opacity = '0';
                scrimRef.current.style.pointerEvents = 'none';
            }
          };

          useEffect(() => {
            const target = mainRef.current;
            const gestureLib = window.useGesture || window.Gesture;
            if (!target || !gestureLib) return;

            const { DragGesture } = gestureLib;
            
            const drag = new DragGesture(target, ({ first, last, movement: [mx, my] }) => {
                if (isZoomed) return;
                if (first) {
                    draggingRef.current = true;
                    autoRotateRef.current = false;
                    startRotRef.current = { ...rotationRef.current };
                }
                
                rotationRef.current.y = wrapAngleSigned(startRotRef.current.y + mx / 20);
                applyTransform(rotationRef.current.x, rotationRef.current.y);

                if (last) {
                    draggingRef.current = false;
                    setTimeout(() => { if(!draggingRef.current) autoRotateRef.current = true; }, 2000);
                }
            }, { eventOptions: { passive: true } });

            return () => drag.destroy();
          }, [isZoomed, applyTransform]);

          return (
            <div ref={rootRef} className="sphere-root">
              <main ref={mainRef} className="sphere-main">
                <div className="stage">
                  <div ref={sphereRef} className="sphere">
                    {items.map((it, i) => (
                      <div 
                        key={`${it.x}-${it.y}-${i}`} 
                        className="item" 
                        style={{ 
                            transform: `rotateY(calc(${it.x} * (360deg / ${segments} / 2))) rotateX(calc(${it.y} * (360deg / ${segments} / 2))) translateZ(var(--radius))`
                        }}
                      >
                        <div className="item__image" onClick={(e) => openItem(e.currentTarget)}>
                          <img src={it.src} alt={it.alt} referrerPolicy="no-referrer" />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="overlay--blur" />
                <div className="viewer">
                  <div ref={scrimRef} className="scrim" onClick={closeItem} />
                </div>
              </main>

              <button className="nav-btn" onClick={() => window.location.reload()}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M9 18l6-6-6-6" />
                </svg>
              </button>

              <div className="info-tag">DINNER ARCHIVE / INDEXED</div>
            </div>
          );
        }

        // --- App 主組件 ---
        function App() {
          return (
            <div style={{ width: '100vw', height: '100vh', margin: 0, padding: 0 }}>
              <DomeGallery images={INITIAL_IMAGES} />
            </div>
          );
        }

        // --- 最後啟動渲染 ---
        const startApp = () => {
          const container = document.getElementById('root');
          if (container) {
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
          }
        };

        // 確保在 DOM 和腳本都就緒後執行
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', startApp);
        } else {
          startApp();
        }
    </script>
</body>
</html>
