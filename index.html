<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Century Holdings Limited - Annual Dinner 2025</title>
    
    <!-- Tailwind CSS 用於快速樣式佈局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React 和 Babel 用於瀏覽器端渲染 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- YouTube API 用於背景音樂 -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010401;
            overflow: hidden;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 預載介面 */
        #preloader {
            position: fixed; inset: 0;
            background-color: #010401;
            z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out;
        }

        .loader-bar-bg {
            width: 200px; height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px; position: relative;
            overflow: hidden; border-radius: 2px;
        }
        .loader-bar-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            background: #10b981; width: 0%;
            transition: width 0.3s ease;
        }

        /* 北極光特效 */
        .aurora-fluid { 
            position: absolute; 
            width: 140vw; height: 140vh; 
            filter: blur(100px); opacity: 0.5; 
            mix-blend-mode: screen; will-change: transform;
        }
        .aurora-v1 { background: radial-gradient(circle at 20% 20%, #064e3b 0%, transparent 65%); animation: aurora-flow 30s infinite alternate ease-in-out; top: -10%; left: -10%; }
        .aurora-v2 { background: radial-gradient(circle at 80% 80%, #065f46 0%, transparent 65%); animation: aurora-flow 35s infinite alternate-reverse ease-in-out; bottom: -10%; right: -10%; }
        .aurora-v3 { background: radial-gradient(circle at 50% 50%, #0d9488 0%, transparent 55%); animation: aurora-flow 25s infinite alternate ease-in-out; top: 15%; left: 15%; }
        
        @keyframes aurora-flow {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(-5%,10%) rotate(-5deg); }
        }

        /* 動畫階段 */
        @keyframes fadeInMove {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-phase-1 { animation: fadeInMove 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .anim-phase-2 { opacity: 0; animation: fadeInMove 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards; }
        .anim-speech-names { opacity: 0; animation: fadeInMove 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; }
        .animate-slide-up { animation: fadeInMove 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .preserve-3d { transform-style: preserve-3d; }

        .watermark-text {
            position: absolute; font-size: 15vw; font-weight: 900;
            color: rgba(255, 255, 255, 0.02); white-space: nowrap;
            user-select: none; pointer-events: none; z-index: 0;
            transform: rotate(-15deg);
        }

        /* 音樂頻譜 */
        .music-bar {
            width: 3px; background: #10b981; margin: 0 1px;
            animation: music-bounce 1s ease-in-out infinite;
        }
        @keyframes music-bounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
    </style>
</head>
<body>
    <!-- 預載遮罩 -->
    <div id="preloader">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 border-2 border-emerald-500 flex items-center justify-center font-bold text-emerald-500 text-sm">GC</div>
            <div class="text-white tracking-[0.2em] text-sm uppercase opacity-80">Good Century</div>
        </div>
        <div class="loader-bar-bg"><div id="loader-fill" class="loader-bar-fill"></div></div>
        <div id="loader-text" class="text-[10px] text-emerald-500/60 mt-3 tracking-widest uppercase">Initializing Assets</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- SVG 圖標 ---
        const IconX = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const IconChevronRight = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        );
        const IconChevronLeft = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        );
        const IconMusic = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        );
        const IconMusicOff = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        );

        // --- 核心配置 ---
        const YOUTUBE_VIDEO_ID = 'jfKfPfyJRdk'; 
        const FIXED_RADIUS = 1100; 

        const DRIVE_IDS = [
            '1_UDb1eM70zzDceSal-FoVtGG5gKvC2G5',
            '1C3rOoEzaVnu4n43vEirqvUiXJ0ooLmPW',
            '1MkJ9nGP7JuR9ykoZOo5Dt4WD8mhMn9TD',
            '1D3PQIbYFjWSkOlR1mSPpJJYSObEQwPCY'
        ];

        const INITIAL_IMAGES = DRIVE_IDS.map(id => ({
            src: `https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
            alt: 'Dinner Archive'
        }));

        const buildItems = (pool, count) => {
            const items = [];
            const rows = 6; 
            const itemsPerRow = Math.ceil(count / rows);
            const horizontalStep = 360 / itemsPerRow; 
            const verticalStep = 11; 
            for (let i = 0; i < count; i++) {
                const rowIndex = (i % rows) - (rows - 1) / 2;
                const colIndex = Math.floor(i / rows);
                const pitch = rowIndex * verticalStep;
                const yaw = colIndex * horizontalStep;
                items.push({ yaw, pitch, src: pool[i % pool.length].src, alt: pool[i % pool.length].alt });
            }
            return items;
        };

        // --- 視覺組件：3D 畫廊 ---
        const GallerySlide = ({ items, radius, isZoomed, setFocusedImage, setIsZoomed }) => {
            const stageRef = useRef(null);
            const rotationRef = useRef({ targetY: 0, currentY: 0 });
            const draggingRef = useRef(false);
            const lastMousePos = useRef({ x: 0 });

            const applyTransform = useCallback((y) => {
                if (stageRef.current) {
                    stageRef.current.style.transform = `translate3d(0, 0, ${-radius}px) rotateY(${y}deg)`;
                }
            }, [radius]);

            useEffect(() => {
                const animate = () => {
                    if (!isZoomed) {
                        if (!draggingRef.current) rotationRef.current.targetY += 0.15; 
                        const lerpFactor = 0.08; 
                        rotationRef.current.currentY += (rotationRef.current.targetY - rotationRef.current.currentY) * lerpFactor;
                        applyTransform(rotationRef.current.currentY);
                    }
                    requestAnimationFrame(animate);
                };
                const raf = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(raf);
            }, [isZoomed, applyTransform]);

            return (
                <div 
                    className="absolute inset-0 flex items-center justify-center [perspective:1800px] z-10 touch-none"
                    onPointerDown={(e) => { draggingRef.current = true; lastMousePos.current.x = e.clientX; }}
                    onPointerMove={(e) => {
                        if (!draggingRef.current) return;
                        const deltaX = e.clientX - lastMousePos.current.x;
                        rotationRef.current.targetY += deltaX * 0.15;
                        lastMousePos.current.x = e.clientX;
                    }}
                    onPointerUp={() => draggingRef.current = false}
                >
                    <div ref={stageRef} className="relative w-0 h-0 preserve-3d will-change-transform">
                        {items.map((it, i) => (
                            <div key={i} className="absolute w-[220px] h-[140px] -left-[110px] -top-[70px] preserve-3d"
                                style={{ transform: `rotateY(${it.yaw}deg) rotateX(${-it.pitch}deg) translateZ(${radius}px)` }}>
                                <div className="group relative w-full h-full cursor-pointer p-[1px] rounded-lg transition-transform duration-500 hover:scale-110 active:scale-95"
                                    onClick={() => { setFocusedImage(it); setIsZoomed(true); }}>
                                    <div className="absolute inset-0 rounded-lg bg-white/10 border border-white/10" />
                                    <div className="relative w-full h-full overflow-hidden rounded-md bg-black/40">
                                        <img src={it.src} alt={it.alt} referrerPolicy="no-referrer" className="w-full h-full object-cover opacity-60 transition-opacity duration-700 group-hover:opacity-100 group-hover:scale-105" loading="lazy" />
                                        <div className="absolute inset-0 shadow-[inset_0_0_25px_rgba(0,0,0,0.4)]" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 視覺組件：標語頁面 ---
        const SloganSlide = () => {
            const line1 = "冠世風華廿二載".split('');
            const line2 = "恆守初心志未改".split('');
            const renderLine = (chars) => (
                <div className="flex justify-center items-center whitespace-nowrap leading-none py-1">
                    {chars.map((char, i) => (
                        <span key={i} className="text-[12vw] md:text-[5.5rem] lg:text-[6.5rem] font-black text-orange-200/95 tracking-[0.05em] drop-shadow-2xl mx-[0.02em]">
                            {char}
                        </span>
                    ))}
                </div>
            );
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-4">
                    <div className="flex flex-col items-center w-full transform -translate-y-12">
                        <div className="anim-phase-1 flex flex-col items-center w-full">
                            <div className="flex flex-col items-center mb-6 opacity-90">
                                <div className="flex items-center gap-4 mb-2">
                                    <div className="w-10 h-10 border-2 border-emerald-400 flex items-center justify-center font-bold text-emerald-400 text-xl tracking-tighter">GC</div>
                                    <h2 className="text-white text-3xl font-bold tracking-tight">冠恒集團</h2>
                                </div>
                                <p className="text-white/60 text-[10px] tracking-[0.3em] uppercase font-medium">Good Century Holdings Limited</p>
                            </div>
                            <div className="relative flex flex-col items-center mb-10">
                                <h1 className="text-5xl md:text-7xl font-light tracking-[0.15em] text-transparent bg-clip-text bg-gradient-to-r from-yellow-100 via-orange-300 to-yellow-200 text-center leading-tight">ANNUAL DINNER</h1>
                                <div className="w-full flex items-center gap-4 mt-2">
                                   <span className="text-orange-300/80 text-base tracking-[0.5em] font-medium">2 0 2 5</span>
                                   <div className="h-[1px] flex-1 bg-gradient-to-r from-orange-300/50 to-transparent" />
                                </div>
                            </div>
                        </div>
                        <div className="anim-phase-2 flex flex-col gap-1 items-center w-full">
                            {renderLine(line1)}
                            {renderLine(line2)}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 視覺組件：致詞頁面 ---
        const SpeechSlide = ({ names }) => {
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6">
                    <div className="flex items-center justify-center w-full max-w-6xl transform -translate-y-8 gap-12 md:gap-32">
                        <div className="anim-phase-1 flex flex-col items-center">
                            <div className="flex gap-8 md:gap-16 mb-2">
                                <span className="text-5xl md:text-8xl font-bold text-orange-200/90 tracking-[0.5em] drop-shadow-lg">致</span>
                                <span className="text-5xl md:text-8xl font-bold text-orange-200/90 tracking-[0.5em] drop-shadow-lg">詞</span>
                            </div>
                            <span className="text-orange-400/60 text-xl md:text-3xl font-light tracking-[0.3em] uppercase">Speech</span>
                        </div>
                        <div className="anim-speech-names flex items-center whitespace-nowrap">
                            <span className="text-5xl md:text-8xl font-medium text-orange-300 tracking-wide drop-shadow-2xl">
                                {names}
                            </span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 視覺組件：長期服務獎 ---
        const AwardTitleSlide = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                <div className="flex flex-col items-center transform -translate-y-8">
                    <h2 className="text-6xl md:text-[9rem] font-bold text-orange-200/95 tracking-[0.2em] drop-shadow-2xl mb-4">長期服務獎</h2>
                    <span className="text-orange-400/60 text-2xl md:text-5xl font-light tracking-[0.4em] uppercase">Long Service Award</span>
                </div>
            </div>
        );

        const ServiceYearSlide = ({ years, names }) => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6">
                <div className="flex flex-col items-center transform -translate-y-12 w-full max-w-6xl">
                    <div className="anim-phase-1 flex flex-col items-center mb-16">
                        <span className="text-orange-200/90 text-5xl md:text-8xl font-black tracking-widest drop-shadow-lg">{years} Years</span>
                        <div className="h-[2px] w-64 bg-gradient-to-r from-transparent via-orange-400 to-transparent mt-4"></div>
                    </div>
                    <div className="anim-speech-names flex flex-col items-center gap-6">
                        {names.split(',').map((name, i) => (
                            <span key={i} className="text-5xl md:text-[7rem] font-medium text-orange-300 tracking-wider drop-shadow-2xl">{name.trim()}</span>
                        ))}
                    </div>
                </div>
            </div>
        );

        const GameTimeTitleSlide = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                <div className="flex flex-col items-center transform -translate-y-8">
                    <h2 className="text-8xl md:text-[14rem] font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-yellow-200 via-emerald-400 to-emerald-600 drop-shadow-[0_20px_60px_rgba(16,185,129,0.5)]">
                        GAME TIME!
                    </h2>
                </div>
            </div>
        );

        const PrizeSlide = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                <div className="relative z-10 flex flex-col items-center w-full max-w-6xl transform -translate-y-4">
                    <div className="w-full flex justify-start mb-6">
                        <span className="text-orange-300/90 text-2xl md:text-4xl font-bold tracking-wide ml-8 md:ml-16 drop-shadow-md">唔係講笑...</span>
                    </div>
                    <div>
                        <h2 className="text-6xl md:text-[8.5rem] font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-orange-300 to-orange-400 drop-shadow-2xl text-center leading-[1.15]">
                            今晚獎金、獎品<br />非常豐富！！
                        </h2>
                    </div>
                </div>
            </div>
        );

        // --- 視覺組件：通用遊戲頁面 (Game 1) ---
        const GameSlide = ({ gameNo, title, subtitle, subtitleEn, prizeText, prizeTextEn, subBoxText }) => (
            <div className="absolute inset-0 flex items-center justify-center z-10 px-6 animate-slide-up">
                <div className="watermark-text" style={{ top: '5%', left: '5%' }}>{title}</div>
                <div className="watermark-text" style={{ bottom: '10%', right: '5%' }}>{title}</div>
                <div className="w-full max-w-6xl relative z-10 transform -translate-y-12">
                    <div className="flex flex-col items-center w-full">
                        <div className="w-full flex justify-between items-end mb-16 border-b border-white/10 pb-4">
                            <div className="flex flex-col items-start"><span className="text-orange-200/90 text-4xl md:text-6xl font-bold tracking-wide drop-shadow-md leading-none">Game {gameNo}</span></div>
                            <div className="text-right"><span className="text-orange-300 text-2xl md:text-5xl font-bold tracking-[0.2em] drop-shadow-lg uppercase leading-none">{title}</span></div>
                        </div>
                        <div className="flex flex-col items-center text-center">
                            <div className="flex flex-col items-center mb-8">
                                <span className="text-orange-300/90 text-3xl md:text-5xl font-bold tracking-[0.5em]">玩法</span>
                                <span className="text-orange-400/40 text-sm md:text-xl font-light tracking-[0.3em] uppercase">How to Play</span>
                            </div>
                            <p className="text-orange-100/90 text-3xl md:text-5xl font-bold tracking-widest leading-relaxed mb-4">{subtitle}</p>
                            <span className="text-orange-400/50 text-sm md:text-2xl font-light tracking-wider mb-12 uppercase">{subtitleEn}</span>

                            <div className="flex flex-col items-center">
                                <span className="text-8xl md:text-[12rem] font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-pink-300 via-purple-400 to-blue-500 drop-shadow-[0_20px_50px_rgba(0,0,0,0.6)] leading-none">{prizeText}</span>
                                <span className="text-blue-300/60 text-xl md:text-4xl font-light tracking-[0.2em] mt-2 uppercase">{prizeTextEn}</span>
                                <div className="mt-8 md:mt-12 px-12 py-4 bg-white/5 backdrop-blur-sm border border-white/10 rounded-lg">
                                    <span className="text-2xl md:text-5xl font-bold text-emerald-400 tracking-[0.3em] drop-shadow-lg">{subBoxText}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- 視覺組件：競飲流程圖 (Game 2) ---
        const CompetitionSlide = () => {
            const GroupBox = ({ title, tables }) => (
                <div className="flex flex-col items-center">
                    <div className="w-full bg-emerald-900/30 border border-emerald-500/40 p-4 rounded-xl backdrop-blur-md shadow-2xl">
                        <span className="block text-emerald-400 font-bold mb-2 text-xl md:text-2xl">{title}</span>
                        <p className="text-white/80 text-lg md:text-xl font-medium tracking-wide">
                            <span className="text-emerald-300/60 mr-2 italic">枱號</span> 
                            {tables}
                        </p>
                    </div>
                    {/* Arrow down */}
                    <div className="my-4 text-emerald-500/60">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                    </div>
                    <div className="w-40 bg-white/5 border border-white/20 py-6 rounded-lg text-center">
                        <span className="text-2xl md:text-3xl font-bold text-orange-200">枱號</span>
                    </div>
                </div>
            );

            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-6 animate-slide-up">
                    <div className="w-full max-w-6xl transform -translate-y-4">
                        <div className="w-full flex justify-between items-end mb-12 border-b border-white/10 pb-4">
                            <div className="flex flex-col items-start"><span className="text-orange-200/90 text-4xl md:text-6xl font-bold tracking-wide drop-shadow-md leading-none">Game 2</span></div>
                            <div className="text-right"><span className="text-orange-300 text-2xl md:text-5xl font-bold tracking-[0.2em] drop-shadow-lg uppercase leading-none">競飲 Competition</span></div>
                        </div>

                        {/* Flowchart grid */}
                        <div className="grid grid-cols-3 gap-6 md:gap-12 mb-8">
                            <GroupBox title="Group 1:" tables="1, 2, 3, 5, 6, 7" />
                            <GroupBox title="Group 2:" tables="8, 9, 10, 11, 12, 13" />
                            <GroupBox title="Group 3:" tables="15, 16, 17, 18, 19" />
                        </div>

                        {/* Final Winner area */}
                        <div className="flex flex-col items-center mt-4">
                             <div className="mb-6 text-emerald-500">
                                <svg width="60" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                            </div>
                            <div className="px-20 py-8 bg-gradient-to-r from-orange-600/40 via-orange-400/40 to-orange-600/40 border-2 border-orange-400/60 rounded-2xl shadow-[0_0_40px_rgba(251,146,60,0.3)]">
                                <span className="text-4xl md:text-7xl font-bold text-white tracking-[0.5em] drop-shadow-2xl">冠・亞・季</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 視覺組件：音樂控制器 ---
        const BackgroundMusic = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const playerRef = useRef(null);
            useEffect(() => {
                window.onYouTubeIframeAPIReady = () => {
                    playerRef.current = new YT.Player('youtube-player', {
                        height: '0', width: '0', videoId: YOUTUBE_VIDEO_ID,
                        playerVars: { autoplay: 1, loop: 1, playlist: YOUTUBE_VIDEO_ID, controls: 0 },
                        events: { onReady: (e) => { e.target.mute(); e.target.playVideo(); } }
                    });
                };
                if (window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
            }, []);
            const toggle = () => {
                if (!playerRef.current) return;
                if (isPlaying) playerRef.current.mute(); else { playerRef.current.unMute(); playerRef.current.setVolume(50); }
                setIsPlaying(!isPlaying);
            };
            return (
                <div className="fixed top-8 right-8 z-50 flex items-center gap-4">
                    <div id="youtube-player" className="hidden"></div>
                    {isPlaying && <div className="flex items-end h-5 mb-1">{[0,0.2,0.4,0.1].map((d,i)=><div key={i} className="music-bar" style={{animationDelay:`${d}s`}}></div>)}</div>}
                    <button onClick={toggle} className="p-4 bg-white/10 hover:bg-emerald-500/30 border border-white/20 rounded-full transition-all backdrop-blur-xl text-white/90 shadow-lg">{isPlaying ? <IconMusic /> : <IconMusicOff />}</button>
                </div>
            );
        };

        // --- 主應用程序 ---
        function App() {
            const [slide, setSlide] = useState(0);
            const [zoom, setZoom] = useState(false);
            const [focusImg, setFocusImg] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const totalSlides = 14;
            const items = useMemo(() => buildItems(INITIAL_IMAGES, 120), []);

            useEffect(() => {
                const imageUrls = Array.from(new Set(items.map(it => it.src)));
                let loadedCount = 0;
                const updateLoader = () => {
                    loadedCount++;
                    const progress = (loadedCount / imageUrls.length) * 100;
                    const fill = document.getElementById('loader-fill');
                    if (fill) fill.style.width = progress + '%';
                    if (loadedCount >= imageUrls.length) {
                        setTimeout(() => {
                            const pre = document.getElementById('preloader');
                            if (pre) pre.style.opacity = '0';
                            setTimeout(() => { if (pre) pre.style.display = 'none'; setIsReady(true); }, 800);
                        }, 500);
                    }
                };
                imageUrls.forEach(url => { const img = new Image(); img.src = url; img.onload = updateLoader; img.onerror = updateLoader; });
            }, [items]);

            if (!isReady) return null;

            return (
                <div className="relative w-full h-screen bg-[#010401] overflow-hidden select-none animate-fade-in">
                    <BackgroundMusic />
                    <div className="absolute inset-0 z-0 scale-125"><div className="aurora-fluid aurora-v1"/><div className="aurora-fluid aurora-v2"/><div className="aurora-fluid aurora-v3"/></div>
                    
                    {slide === 0 && <GallerySlide items={items} radius={FIXED_RADIUS} isZoomed={zoom} setFocusedImage={setFocusImg} setIsZoomed={setZoom} />}
                    {slide === 1 && <SloganSlide />}
                    {slide === 2 && <SpeechSlide names="Morris Mikey" />}
                    {slide === 3 && <SpeechSlide names="Teddy Kanji" />}
                    {slide === 4 && <AwardTitleSlide />}
                    {slide === 5 && <ServiceYearSlide years="10" names="David Tsang" />}
                    {slide === 6 && <ServiceYearSlide years="15" names="Kanji Kwok" />}
                    {slide === 7 && <ServiceYearSlide years="20" names="Kason Lau, Steven Ngai" />}
                    {slide === 8 && <ServiceYearSlide years="25" names="Wilson Chang" />}
                    {slide === 9 && <GameTimeTitleSlide />}
                    {slide === 10 && <PrizeSlide />}
                    {slide === 11 && (
                        <GameSlide 
                            gameNo="1" 
                            title="Lucky Table" 
                            subtitle="被抽中的枱號，每人皆可獲得" 
                            subtitleEn="The drawn table number, everyone wins"
                            prizeText="豐富獎品" 
                            prizeTextEn="Fabulous Prizes"
                            subBoxText="個人護理及小家電"
                        />
                    )}
                    {slide === 12 && <GallerySlide items={items} radius={FIXED_RADIUS} isZoomed={zoom} setFocusedImage={setFocusImg} setIsZoomed={setZoom} />}
                    {slide === 13 && <CompetitionSlide />}
                    
                    <div className="fixed bottom-12 left-1/2 -translate-x-1/2 z-40 flex items-center gap-6">
                        <button onClick={()=>setSlide(p=>Math.max(0,p-1))} className={`p-4 rounded-full border transition-all ${slide>0 ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-400' : 'opacity-20 pointer-events-none'}`}><IconChevronLeft size={24}/></button>
                        <div className="flex gap-2">{[...Array(totalSlides)].map((_,i)=><div key={i} className={`w-2 h-2 rounded-full transition-all ${slide===i ? 'bg-emerald-400 w-8' : 'bg-white/20'}`}/>)}</div>
                        <button onClick={()=>setSlide(p=>Math.min(totalSlides-1,p+1))} className={`p-4 rounded-full border transition-all ${slide<totalSlides-1 ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-400' : 'opacity-20 pointer-events-none'}`}><IconChevronRight size={24}/></button>
                    </div>
                    
                    {zoom && focusImg && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/98 backdrop-blur-3xl p-4" onClick={()=>setZoom(false)}>
                            <div className="relative max-w-6xl max-h-[85vh] shadow-2xl rounded-2xl border border-white/10 overflow-hidden"><img src={focusImg.src} referrerPolicy="no-referrer" className="block w-full h-full object-contain" /></div>
                            <button className="absolute top-8 right-8 p-4 bg-white/10 text-white rounded-full"><IconX /></button>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
